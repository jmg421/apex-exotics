<!DOCTYPE html>
<html>
<head>
    <title>ENIS Portfolio Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { 
            font-size: 2em; 
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #888; margin-bottom: 30px; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
        }
        .stat-label { color: #888; font-size: 0.9em; margin-bottom: 5px; }
        .stat-value { font-size: 1.8em; font-weight: bold; }
        .positive { color: #10b981; }
        .negative { color: #ef4444; }
        .chart-container {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .positions {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
        }
        .position {
            display: grid;
            grid-template-columns: 80px 1fr 120px 120px 120px;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid #333;
            align-items: center;
        }
        .position:last-child { border-bottom: none; }
        .ticker {
            font-weight: bold;
            font-size: 1.1em;
            color: #667eea;
        }
        .position-details { color: #888; font-size: 0.9em; }
        .value { text-align: right; font-weight: 500; }
        .allocation {
            background: #333;
            border-radius: 4px;
            height: 8px;
            overflow: hidden;
        }
        .allocation-bar {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s;
        }
        h2 { margin-bottom: 15px; color: #fff; }
        .refresh {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
        }
        .refresh:hover { background: #764ba2; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 ENIS Portfolio Dashboard</h1>
        <p class="subtitle">Attention Arbitrage • Paper Trading • Real-Time Data <span id="demo-badge"></span></p>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Total Value</div>
                <div class="stat-value" id="total-value">$0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Return</div>
                <div class="stat-value" id="total-return">$0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Return %</div>
                <div class="stat-value" id="return-pct">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Cash</div>
                <div class="stat-value" id="cash">$0</div>
            </div>
        </div>

        <div class="chart-container">
            <h2>Portfolio Performance</h2>
            <canvas id="performance-chart"></canvas>
        </div>

        <div class="positions">
            <h2>Positions</h2>
            <div id="positions-list"></div>
        </div>
    </div>

    <button class="refresh" onclick="loadData()">↻ Refresh</button>

    <script>
        let performanceChart = null;

        function formatMoney(value) {
            return '$' + value.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        function formatPercent(value) {
            const sign = value >= 0 ? '+' : '';
            return sign + value.toFixed(2) + '%';
        }

        async function loadData() {
            // Load portfolio data
            const portfolio = await fetch('/api/portfolio').then(r => r.json());
            
            // Show demo mode badge
            if (portfolio.demo_mode) {
                document.getElementById('demo-badge').innerHTML = 
                    '<span style="background: #ef4444; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; margin-left: 10px;">DEMO MODE</span>';
            }
            
            // Update stats
            document.getElementById('total-value').textContent = formatMoney(portfolio.total_value);
            document.getElementById('total-return').textContent = formatMoney(portfolio.total_return);
            document.getElementById('return-pct').textContent = formatPercent(portfolio.total_return_pct);
            document.getElementById('cash').textContent = formatMoney(portfolio.cash);
            
            // Color code returns
            const returnEl = document.getElementById('total-return');
            const pctEl = document.getElementById('return-pct');
            const colorClass = portfolio.total_return >= 0 ? 'positive' : 'negative';
            returnEl.className = 'stat-value ' + colorClass;
            pctEl.className = 'stat-value ' + colorClass;
            
            // Update positions
            const positionsList = document.getElementById('positions-list');
            positionsList.innerHTML = portfolio.positions.map(pos => `
                <div class="position">
                    <div class="ticker">${pos.ticker}</div>
                    <div>
                        <div>${pos.shares} shares @ ${formatMoney(pos.avg_price)}</div>
                        <div class="position-details">Current: ${formatMoney(pos.current_price)}</div>
                    </div>
                    <div class="value">${formatMoney(pos.value)}</div>
                    <div class="value ${pos.pnl >= 0 ? 'positive' : 'negative'}">
                        ${formatMoney(pos.pnl)}<br>
                        <span style="font-size: 0.9em">${formatPercent(pos.pnl_pct)}</span>
                    </div>
                    <div>
                        <div style="text-align: right; margin-bottom: 5px; font-size: 0.9em">
                            ${pos.allocation.toFixed(1)}%
                        </div>
                        <div class="allocation">
                            <div class="allocation-bar" style="width: ${pos.allocation}%"></div>
                        </div>
                    </div>
                </div>
            `).join('');
            
            // Load history
            const history = await fetch('/api/history').then(r => r.json());
            
            if (history.length > 0) {
                updateChart(history);
            }
        }

        function updateChart(history) {
            const ctx = document.getElementById('performance-chart').getContext('2d');
            
            if (performanceChart) {
                performanceChart.destroy();
            }
            
            performanceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: history.map(h => h.date),
                    datasets: [{
                        label: 'Portfolio Value',
                        data: history.map(h => h.value),
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    aspectRatio: 3,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#1a1a1a',
                            titleColor: '#e0e0e0',
                            bodyColor: '#e0e0e0',
                            borderColor: '#333',
                            borderWidth: 1,
                            callbacks: {
                                label: function(context) {
                                    return 'Value: ' + formatMoney(context.parsed.y);
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            ticks: { 
                                color: '#888',
                                callback: function(value) {
                                    return '$' + (value/1000).toFixed(0) + 'k';
                                }
                            },
                            grid: { color: '#333' }
                        },
                        x: {
                            ticks: { color: '#888' },
                            grid: { color: '#333' }
                        }
                    }
                }
            });
        }

        // Load data on page load
        loadData();
        
        // Auto-refresh every 5 seconds in demo mode, 60 seconds in live mode
        setInterval(loadData, 5000);
    </script>
</body>
</html>
