<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Feature-Policy" content="autoplay 'self'">
    <title>Sports Stats Monitor - Margins Over Score</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 15px;
            margin: 0;
            transition: background 0.5s ease;
        }
        body.team-dominant {
            background: radial-gradient(ellipse at top left, var(--team-color-dim) 0%, #0a0a0a 50%);
        }
        :root {
            --accent-color: #BB0000;
            --team-color: #BB0000;
            --team-color-dim: rgba(187, 0, 0, 0.03);
            --team-color-rgb: 187, 0, 0;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 1800px;
            margin: 0 auto;
        }
        .top-row {
            display: grid;
            grid-template-columns: 1.3fr 350px;
            gap: 15px;
        }
        .detail-panel {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #333;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            max-height: 600px;
        }
        .stream-container {
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #333;
            position: relative;
            min-height: 400px;
        }
        .stream-container video,
        .stream-container iframe {
            width: 100%;
            height: 100%;
            min-height: 400px;
            display: block;
            object-fit: contain;
            background: #000;
        }
        .excitement-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 24px;
            font-weight: bold;
            color: #FFC107;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .control-panel {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .control-panel select {
            padding: 4px 8px;
            background: #1a1a1a;
            color: #e0e0e0;
            border: 1px solid #333;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
        }
        .switch-alert {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 193, 7, 0.95);
            color: #000;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            display: none;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .player-column {
            background: #0f0f0f;
            border-radius: 6px;
            padding: 12px;
        }
        .player-column h3 {
            color: #BB0000;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .player-list {
            font-size: 16px;
            color: #aaa;
            line-height: 1.8;
        }
        .games-bar {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #333;
            overflow: hidden;
            position: relative;
        }
        .games-bar-scroll {
            display: flex;
            gap: 10px;
            will-change: transform;
        }
        .games-bar-scroll:hover {
            /* Pause handled by JS */
        }
        .game-bar-item {
            flex-shrink: 0;
            background: #0f0f0f;
            padding: 10px 15px;
            border-radius: 6px;
            border-left: 3px solid #333;
            min-width: 200px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .game-bar-item:hover {
            background: #1a1a1a;
            border-left-color: #4CAF50;
        }
        .game-bar-item.top {
            border-left-color: #FFC107;
            background: rgba(255, 193, 7, 0.1);
        }
        .game-bar-item.selected {
            border-left-color: #4CAF50;
            background: rgba(76, 175, 80, 0.1);
        }
        .games-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .efficiency-panel {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #333;
            max-height: 400px;
            overflow-y: auto;
        }
        .strategy-panel {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #333;
            margin-top: 15px;
        }
        .strategy-panel h3 {
            color: var(--accent-color);
            font-size: 14px;
            margin-bottom: 12px;
            transition: color 0.5s ease;
        }
        .strategy-alert {
            padding: 10px;
            margin-bottom: 8px;
            background: rgba(255, 193, 7, 0.1);
            border-left: 3px solid #FFC107;
            border-radius: 4px;
            font-size: 12px;
        }
        .strategy-alert.strong {
            background: rgba(76, 175, 80, 0.1);
            border-left-color: var(--accent-color);
        }
        .strategy-alert .label {
            color: #FFC107;
            font-weight: 600;
            font-size: 10px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .strategy-alert.strong .label {
            color: var(--accent-color);
        }
        .strategy-alert .message {
            color: #e0e0e0;
            line-height: 1.4;
        }
        .efficiency-panel h3 {
            color: var(--accent-color);
            font-size: 14px;
            margin-bottom: 12px;
            transition: color 0.5s ease;
        }
        .efficiency-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
            margin-bottom: 4px;
            background: #0f0f0f;
            border-radius: 4px;
            font-size: 12px;
            border-left: 3px solid transparent;
            transition: border-color 0.3s ease;
        }
        .efficiency-item.top {
            border-left-color: var(--accent-color);
        }
        .efficiency-rank {
            color: #666;
            font-weight: 600;
            min-width: 25px;
        }
        .efficiency-team {
            flex: 1;
            color: #e0e0e0;
        }
        .efficiency-score {
            color: var(--accent-color);
            font-weight: 600;
            transition: color 0.5s ease;
        }
        .header {
            text-align: center;
            padding: 15px;
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .header h1 { 
            color: var(--accent-color); 
            margin-bottom: 5px;
            font-size: 24px;
            transition: color 0.5s ease;
        }
        .header p { 
            color: #888; 
            font-size: 13px;
            margin: 0;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .game-card {
            background: #1a1a1a;
            border-radius: 6px;
            padding: 10px;
            border: 1px solid #333;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .game-card:hover {
            border-color: var(--accent-color);
        }
        .game-card.selected {
            border-color: var(--accent-color);
            background: #1f1f1f;
        }
        .game-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .game-details {
            display: none;
        }
        .teams-compact {
            flex: 1;
            font-size: 13px;
            font-weight: 600;
        }
        .scores-compact {
            display: flex;
            gap: 8px;
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-color);
            transition: color 0.5s ease;
        }
        .clock-compact {
            font-size: 11px;
            color: #888;
            white-space: nowrap;
        }
        .game-details {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #333;
        }
        .game-card.expanded .game-details {
            display: block;
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }
        .matchup { font-size: 14px; font-weight: 600; }
        .status { 
            color: #4CAF50;
            font-size: 11px;
            background: rgba(76, 175, 80, 0.1);
            padding: 3px 8px;
            border-radius: 4px;
        }
        .score-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 16px;
            font-weight: 700;
        }
        .team { display: flex; align-items: center; gap: 6px; }
        .team-name { min-width: 100px; font-size: 13px; }
        .score {

            font-size: 24px;

            text-align: right;
        }

            background: #0f0f0f;
            border-radius: 4px;
            padding: 10px;
        }
        .margins h3 {
            color: #888;
            font-size: 10px;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .stat-row {
            display: grid;
            grid-template-columns: 90px 1fr 1fr;
            gap: 6px;
            margin-bottom: 5px;
            font-size: 11px;
        }
        .stat-label { color: #888; font-weight: 600; }
        .stat-value {
            text-align: right;
            font-weight: 600;
        }
        .stat-value.better { color: #4CAF50; }
        .stat-value.worse { color: #666; }
        .insight {
            margin-top: 8px;
            padding: 6px;
            background: rgba(76, 175, 80, 0.1);
            border-left: 2px solid #4CAF50;
            border-radius: 3px;
            font-size: 10px;
            color: #aaa;
            line-height: 1.4;
        }
        .insight.warning {
            background: rgba(255, 193, 7, 0.1);
            border-left-color: #FFC107;
        }
        .insight.danger {
            background: rgba(244, 67, 54, 0.1);
            border-left-color: #F44336;
        }
        .action-buttons {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }
        .btn {
            flex: 1;
            padding: 6px;
            border: 1px solid #333;
            background: #0f0f0f;
            color: #e0e0e0;
            border-radius: 3px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn:hover {
            border-color: #4CAF50;
            background: #1a1a1a;
        }
        .btn.active {
            background: #4CAF50;
            border-color: #4CAF50;
            color: #000;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        .detail-panel {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #333;
            position: sticky;
            top: 15px;
            max-height: calc(100vh - 30px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }
        .detail-content-wrapper {
            flex: 1;
            overflow-y: auto;
            z-index: 2;
        }
        .live-ticker {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #333;
            height: 180px;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }
        .ticker-label {
            color: #888;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .ticker-content {
            display: flex;
            flex-direction: column;
            gap: 6px;
            animation: tickerScroll 20s linear infinite;
        }
        .ticker-item {
            font-size: 12px;
            color: #aaa;
            padding: 4px 8px;
            background: #0f0f0f;
            border-radius: 3px;
            border-left: 2px solid #BB0000;
            white-space: nowrap;
        }
        .ticker-item.milestone {
            color: #BB0000;
            font-weight: 600;
        }
        @keyframes tickerScroll {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }
        .detail-panel h2 {
            color: #BB0000;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .detail-panel p {
            color: #888;
            line-height: 1.6;
            margin-bottom: 10px;
            font-size: 13px;
        }
        .detail-panel .highlight {
            color: #4CAF50;
            font-weight: 600;
        }
        .connection-status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .connection-status.show {
            opacity: 1;
        }
        .connection-status.error {
            background: rgba(244, 67, 54, 0.9);
            color: white;
        }
        .connection-status.reconnecting {
            background: rgba(255, 193, 7, 0.9);
            color: #000;
        }
    </style>
</head>
<body>
    <div class="connection-status" id="connection-status"></div>
    <div class="container">
        <div class="top-row">
            <div class="stream-container">
                <div id="loading-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; display: flex; align-items: center; justify-content: center; z-index: 1000;">
                    <div style="text-align: center;">
                        <div style="font-size: 48px; margin-bottom: 20px;">📺</div>
                        <div style="font-size: 24px; color: #e0e0e0; margin-bottom: 20px;">Loading stream...</div>
                        <div id="buffer-progress" style="font-size: 18px; color: #4A90E2; font-weight: bold;">Buffering 0s / 60s</div>
                        <div style="width: 300px; height: 8px; background: #333; border-radius: 4px; margin: 20px auto; overflow: hidden;">
                            <div id="buffer-bar" style="width: 0%; height: 100%; background: #4A90E2; transition: width 0.3s;"></div>
                        </div>
                    </div>
                </div>
                <video id="video" controls playsinline muted allow="autoplay"></video>
                <div class="excitement-overlay" id="excitement-score">
                    <span id="excitement-value">--</span>
                    <div class="control-panel">
                        <button onclick="showESPN()" style="padding: 4px 8px; background: #1a1a1a; color: #e0e0e0; border: 1px solid #333; border-radius: 4px; font-size: 11px; cursor: pointer; margin-right: 6px;" title="Show ESPN">📺</button>
                        <button onclick="showStreamers()" style="padding: 4px 8px; background: #1a1a1a; color: #e0e0e0; border: 1px solid #333; border-radius: 4px; font-size: 11px; cursor: pointer; margin-right: 6px;" title="Streamer Feed">🎮</button>
                        <button onclick="showPersonalized()" style="padding: 4px 8px; background: #1a1a1a; color: #e0e0e0; border: 1px solid #333; border-radius: 4px; font-size: 11px; cursor: pointer; margin-right: 6px;" title="For You">✨</button>
                        <button onclick="switchToChannel(119)" style="padding: 4px 8px; background: #4A90E2; color: #fff; border: 1px solid #4A90E2; border-radius: 4px; font-size: 11px; cursor: pointer; margin-right: 6px;" title="Today Show">☀️ Today</button>
                        <button onclick="saveClip()" style="padding: 4px 8px; background: #E74C3C; color: #fff; border: 1px solid #E74C3C; border-radius: 4px; font-size: 11px; cursor: pointer; margin-right: 6px;" title="Save Last 5 Minutes">💾 Save</button>
                        <button onclick="showESPNGuide()" style="padding: 4px 8px; background: #BB0000; color: #fff; border: 1px solid #BB0000; border-radius: 4px; font-size: 11px; cursor: pointer; margin-right: 6px;" title="ESPN Guide">📡 ESPN</button>
                        <select id="sport-selector" title="Select Sport">
                            <option value="ncaa-basketball">🏀 NCAA</option>
                            <option value="nba">🏀 NBA</option>
                            <option value="mlb">⚾ MLB</option>
                            <option value="nhl">🏒 NHL</option>
                        </select>
                    </div>
                </div>
                <div class="switch-alert" id="switch-alert">⚠️ Switch to Channel XXX</div>
                <div id="espn-guide" style="display: none; position: absolute; top: 50px; right: 10px; background: #1a1a1a; border: 2px solid #BB0000; border-radius: 8px; padding: 15px; max-width: 400px; z-index: 1000;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <h3 style="margin: 0; color: #BB0000;">📺 ESPN Guide</h3>
                        <button onclick="closeESPNGuide()" style="background: none; border: none; color: #e0e0e0; font-size: 20px; cursor: pointer;">×</button>
                    </div>
                    <div id="espn-programs" style="max-height: 400px; overflow-y: auto;">
                        Loading...
                    </div>
                </div>
            </div>
            <div class="detail-panel" id="detail-panel">
                <div class="player-column" id="away-players">
                    <h3 id="away-team-name">ESPN</h3>
                    <div id="away-player-list" class="player-list"></div>
                </div>
                <div class="player-column" id="home-players">
                    <h3 id="home-team-name">Live Ticker</h3>
                    <div id="home-player-list" class="player-list">📰 Fetching latest news...</div>
                </div>
            </div>
        </div>
        
        <div class="games-bar" id="games-bar">
            <p style="color: #666; font-size: 12px;">Loading games...</p>
        </div>
    </div>

    <script>
        let selectedGames = new Set();
        let previousStats = {}; // Track stat changes for ticker
        let currentSport = localStorage.getItem('selectedSport') || 'ncaa-basketball';
        let currentGameId = null; // Track which game is being viewed
        // State is now managed by appState object

        // Set dropdown to saved value
        document.getElementById('sport-selector').value = currentSport;

        // Sport selector
        document.getElementById('sport-selector').addEventListener('change', (e) => {
            currentSport = e.target.value;
            localStorage.setItem('selectedSport', currentSport);
            
            // Update icon and panel title
            const sportIcons = {
                'ncaa-basketball': '🏀',
                'nba': '🏀',
                'mlb': '⚾',
                'nhl': '🏒'
            };
            selectedGames.clear();
            previousStats = {};
            loadGames();
        });

        // Set initial values
        let currentSelectedGame = null; // Track which game is selected
        let allGameStats = {}; // Store all game stats for efficiency ranking

        async function loadGames() {
            try {
                const games = await safeFetch(`/api/games?sport=${currentSport}`);
                if (!games) {
                    showError('games', 'Unable to load games');
                    appState.setConnectionHealth(false);
                    return;
                }
                
                if (!Array.isArray(games)) {
                    console.error('Invalid games data - not an array:', games);
                    showError('games', 'Invalid game data');
                    return;
                }
                
                appState.updateGamesTimestamp();
                appState.setConnectionHealth(true);
                
                // Only show LIVE games (margins only matter during the game)
                const liveGames = games.filter(g => g.state === 'live' || g.state === 'in');
                const upcomingGames = games.filter(g => g.state === 'pre');

                if (liveGames.length === 0 && upcomingGames.length === 0) {
                    safeSetHTML('games', '<div class="loading">No games scheduled right now.</div>');
                    return;
                }

                // Show live games first, then upcoming (max 16 games for 4x4 grid)
                const displayGames = [...liveGames, ...upcomingGames].slice(0, 16);
                displayGames.forEach(g => selectedGames.add(g.id));
                displayGamesList(displayGames);
                
                // Load stats for all games to calculate efficiency
                loadAllGameStats(liveGames);
            } catch (err) {
                console.error('Error loading games:', err);
                showError('games', 'Error loading games');
                appState.setConnectionHealth(false);
            }
        }

        async function loadAllGameStats(games) {
            const statsPromises = games.map(async (game) => {
                try {
                    const resp = await fetch(`/api/game/${game.id}/stats?sport=${currentSport}`);
                    const data = await resp.json();
                    if (data.teams && data.teams.length === 2) {
                        allGameStats[game.id] = {
                            away: game.away,
                            home: game.home,
                            data: data
                        };
                    }
                } catch (err) {
                    console.error(`Error loading stats for ${game.id}:`, err);
                }
            });
            
            await Promise.all(statsPromises);
            // updateEfficiencyRankings(); // Removed - efficiency panel deleted
        }

        function updateEfficiencyRankings() {
            // For NHL, show top players instead of PQD
            if (currentSport === 'nhl') {
                displayNHLTopPlayers();
                return;
            }
            
            // For NBA, show top players if viewing a game
            if (currentSport === 'nba' && currentGameId && allGameStats[currentGameId]) {
                displayNBATopPlayers();
                return;
            }
            
            // For NCAA and NBA (no game selected), show PQD rankings
            const rankings = [];
            const alerts = [];
            
            for (const [gameId, gameData] of Object.entries(allGameStats)) {
                const homeData = gameData.data.teams.find(t => t.is_home) || gameData.data.teams[0];
                const awayData = gameData.data.teams.find(t => !t.is_home) || gameData.data.teams[1];
                
                // Calculate PQD (Possession Quality Differential)
                const calcPQD = (team, opp, teamScore, oppScore) => {
                    const fga = parseInt(team.fg_att) || 0;
                    const fta = parseInt(team.three_att) || 0; // Using 3PT att as proxy for FTA
                    const to = parseInt(team.turnovers) || 0;
                    const offReb = parseInt(team.rebounds) * 0.3 || 0; // Estimate 30% are offensive
                    const defReb = parseInt(opp.rebounds) * 0.7 || 0; // Estimate 70% are defensive
                    
                    // Points per possession
                    const possessions = fga + (0.44 * fta) + to;
                    const ppp = possessions > 0 ? teamScore / possessions : 0;
                    const oppPpp = possessions > 0 ? oppScore / possessions : 0;
                    
                    // Second chance rate (estimated)
                    const secondChance = (offReb + defReb) > 0 ? offReb / (offReb + defReb) : 0;
                    const oppSecondChance = (offReb + defReb) > 0 ? defReb / (offReb + defReb) : 0;
                    
                    // Turnover conversion (estimated as assists/opp turnovers)
                    const assists = parseInt(team.assists) || 0;
                    const oppTo = parseInt(opp.turnovers) || 0;
                    const toConversion = oppTo > 0 ? assists / oppTo : 0;
                    
                    const pqd = (ppp - oppPpp) + (secondChance - oppSecondChance) * 3 + (toConversion * 2);
                    
                    return {
                        pqd: pqd,
                        ppp: ppp.toFixed(2),
                        second_chance: (secondChance * 100).toFixed(1),
                        to_conversion: toConversion.toFixed(2)
                    };
                };
                
                const awayScore = parseInt(gameData.data.teams.find(t => !t.is_home)?.score || 0);
                const homeScore = parseInt(gameData.data.teams.find(t => t.is_home)?.score || 0);
                
                const awayPQD = calcPQD(awayData, homeData, awayScore, homeScore);
                const homePQD = calcPQD(homeData, awayData, homeScore, awayScore);
                
                rankings.push({
                    team: gameData.away,
                    pqd: awayPQD.pqd.toFixed(2),
                    ppp: awayPQD.ppp,
                    second_chance: awayPQD.second_chance,
                    to_conversion: awayPQD.to_conversion
                });
                rankings.push({
                    team: gameData.home,
                    pqd: homePQD.pqd.toFixed(2),
                    ppp: homePQD.ppp,
                    second_chance: homePQD.second_chance,
                    to_conversion: homePQD.to_conversion
                });
                
                // JARVIS STRATEGY 1: Halftime Adjustment (margin divergence)
                const period = gameData.data.period || '';
                if (period.includes('HALF') || period.includes('2ND')) {
                    const awayFGPct = parseFloat(awayData.fg_pct) || 0;
                    const homeFGPct = parseFloat(homeData.fg_pct) || 0;
                    const awayTO = parseInt(awayData.turnovers) || 0;
                    const homeTO = parseInt(homeData.turnovers) || 0;
                    const awayReb = parseInt(awayData.rebounds) || 0;
                    const homeReb = parseInt(homeData.rebounds) || 0;
                    
                    // Check margin control
                    const awayMargins = (awayFGPct > homeFGPct ? 1 : 0) + 
                                       (parseFloat(awayData.three_pct) > parseFloat(homeData.three_pct) ? 1 : 0) +
                                       (awayTO < homeTO ? 1 : 0) + 
                                       (awayReb > homeReb ? 1 : 0);
                    const homeMargins = 4 - awayMargins;
                    
                    // Get scores from game data (need to fetch from games list)
                    const game = Array.from(selectedGames).find(id => id === gameId);
                    
                    if (awayMargins >= 3 && awayEff > homeEff + 5) {
                        alerts.push({
                            type: 'strong',
                            label: 'Halftime Value',
                            message: `${gameData.away} controls ${awayMargins}/4 margins. 2H spread opportunity if trailing.`
                        });
                    }
                    if (homeMargins >= 3 && homeEff > awayEff + 5) {
                        alerts.push({
                            type: 'strong',
                            label: 'Halftime Value',
                            message: `${gameData.home} controls ${homeMargins}/4 margins. 2H spread opportunity if trailing.`
                        });
                    }
                }
                
                // JARVIS STRATEGY 2: Efficiency regime change
                if (previousStats[gameId]) {
                    const prevAwayFG = parseFloat(previousStats[gameId].awayFGPct) || 0;
                    const prevHomeFG = parseFloat(previousStats[gameId].homeFGPct) || 0;
                    const currAwayFG = parseFloat(awayData.fg_pct) || 0;
                    const currHomeFG = parseFloat(homeData.fg_pct) || 0;
                    
                    // Detect cooling off (FG% dropping significantly)
                    if (prevAwayFG > 55 && currAwayFG < prevAwayFG - 3) {
                        alerts.push({
                            type: 'warning',
                            label: 'Cooling Off',
                            message: `${gameData.away} FG% dropping (${prevAwayFG.toFixed(1)}% → ${currAwayFG.toFixed(1)}%). Live under opportunity.`
                        });
                    }
                    if (prevHomeFG > 55 && currHomeFG < prevHomeFG - 3) {
                        alerts.push({
                            type: 'warning',
                            label: 'Cooling Off',
                            message: `${gameData.home} FG% dropping (${prevHomeFG.toFixed(1)}% → ${currHomeFG.toFixed(1)}%). Live under opportunity.`
                        });
                    }
                    
                    // Detect heating up (FG% rising significantly)
                    if (prevAwayFG < 45 && currAwayFG > prevAwayFG + 3) {
                        alerts.push({
                            type: 'warning',
                            label: 'Heating Up',
                            message: `${gameData.away} FG% rising (${prevAwayFG.toFixed(1)}% → ${currAwayFG.toFixed(1)}%). Live over opportunity.`
                        });
                    }
                    if (prevHomeFG < 45 && currHomeFG > prevHomeFG + 3) {
                        alerts.push({
                            type: 'warning',
                            label: 'Heating Up',
                            message: `${gameData.home} FG% rising (${prevHomeFG.toFixed(1)}% → ${currHomeFG.toFixed(1)}%). Live over opportunity.`
                        });
                    }
                }
            }
            
            // Sort by PQD
            rankings.sort((a, b) => b.pqd - a.pqd);
            
            // Display top 10
            const container = document.getElementById('efficiency-rankings');
            container.innerHTML = rankings.slice(0, 10).map((item, index) => {
                const isPositive = item.pqd > 0;
                const isStrong = Math.abs(item.pqd) > 0.5;
                const color = isStrong ? (isPositive ? '#4CAF50' : '#f44336') : '#888';
                const bgColor = isStrong ? (isPositive ? 'rgba(76, 175, 80, 0.1)' : 'rgba(244, 67, 54, 0.1)') : 'transparent';
                
                return `
                    <div class="efficiency-item" style="background: ${bgColor}; border-left: 3px solid ${isStrong ? color : '#333'};">
                        <div style="flex: 1;">
                            <div style="font-weight: 600; color: ${color};">${item.team}</div>
                            <div style="font-size: 9px; color: #666; margin-top: 2px;">
                                PPP: ${item.ppp} | 2nd: ${item.second_chance}% | TO→Pts: ${item.to_conversion}
                            </div>
                        </div>
                        <div style="font-size: 16px; font-weight: 700; color: ${color};">
                            ${item.pqd > 0 ? '+' : ''}${item.pqd}
                        </div>
                    </div>
                `;
            }).join('');
            
            // Display strategy alerts
            const alertsContainer = document.getElementById('strategy-alerts');
            if (alerts.length > 0) {
                alertsContainer.innerHTML = alerts.slice(0, 3).map(alert => `
                    <div class="strategy-alert ${alert.type}">
                        <div class="label">${alert.label}</div>
                        <div class="message">${alert.message}</div>
                    </div>
                `).join('');
            } else {
                alertsContainer.innerHTML = '<div style="color: #888; font-size: 11px;">No opportunities detected yet...</div>';
            }
        }

                        let energyBar = '';
                        
                        if (iceSeconds) {
                            // Typical shift: 45 seconds, typical TOI per period: ~5-7 minutes
                            // Energy = 100% - (ice_seconds / 1200) * 100 (20 min period = 1200 sec)
                            const fatigue = Math.min((iceSeconds / 1200) * 100, 100);
                            const energy = 100 - fatigue;
                            const energyColor = energy > 60 ? '#4CAF50' : (energy > 30 ? '#FFC107' : '#f44336');

        async function loadGameStats(gameId, awayTeam, homeTeam) {
            currentGameId = gameId; // Track current game
            
            try {
                const resp = await fetch(`/api/game/${gameId}/stats?sport=${currentSport}`);
                const data = await resp.json();
                
                if (data.teams && data.teams.length === 2) {
                    // Generate ticker events from stat changes
                    updateTicker(gameId, data, awayTeam, homeTeam);
                    
                    displayDetailedMargins(data, awayTeam, homeTeam);
                }
            } catch (err) {
                console.error(`Error loading stats for game ${gameId}:`, err);
            }
        }

        function updateTicker(gameId, data, awayTeam, homeTeam) {
            const tickerContent = document.getElementById('ticker-content');
            if (!tickerContent) return;

            const homeData = data.teams.find(t => t.is_home) || data.teams[0];
            const awayData = data.teams.find(t => !t.is_home) || data.teams[1];
            
            const events = [];
            const now = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

            // Check for stat changes
            if (previousStats[gameId]) {
                const prev = previousStats[gameId];
                
                // Field goals
                const awayFGDiff = parseInt(awayData.fg_made) - parseInt(prev.awayFG);
                const homeFGDiff = parseInt(homeData.fg_made) - parseInt(prev.homeFG);
                if (awayFGDiff > 0) events.push(`${now} - ${awayTeam}: +${awayFGDiff} FG`);
                if (homeFGDiff > 0) events.push(`${now} - ${homeTeam}: +${homeFGDiff} FG`);
                
                // Three pointers
                const away3Diff = parseInt(awayData.three_made) - parseInt(prev.away3PT);
                const home3Diff = parseInt(homeData.three_made) - parseInt(prev.home3PT);
                if (away3Diff > 0) events.push(`${now} - ${awayTeam}: 🎯 ${away3Diff} three-pointer${away3Diff > 1 ? 's' : ''}`);
                if (home3Diff > 0) events.push(`${now} - ${homeTeam}: 🎯 ${home3Diff} three-pointer${home3Diff > 1 ? 's' : ''}`);
                
                // Turnovers
                const awayTODiff = parseInt(awayData.turnovers) - parseInt(prev.awayTO);
                const homeTODiff = parseInt(homeData.turnovers) - parseInt(prev.homeTO);
                if (awayTODiff > 0) events.push(`${now} - ${awayTeam}: ⚠️ +${awayTODiff} turnover${awayTODiff > 1 ? 's' : ''}`);
                if (homeTODiff > 0) events.push(`${now} - ${homeTeam}: ⚠️ +${homeTODiff} turnover${homeTODiff > 1 ? 's' : ''}`);
                
                // Efficiency milestones
                const awayFGPct = parseFloat(awayData.fg_pct);
                const homeFGPct = parseFloat(homeData.fg_pct);
                if (awayFGPct >= 60 && parseFloat(prev.awayFGPct) < 60) {
                    events.push(`${now} - 🔥 ${awayTeam} shooting 60%+ from field`);
                }
                if (homeFGPct >= 60 && parseFloat(prev.homeFGPct) < 60) {
                    events.push(`${now} - 🔥 ${homeTeam} shooting 60%+ from field`);
                }
            }

            // Store current stats for next comparison
            previousStats[gameId] = {
                awayFG: awayData.fg_made,
                homeFG: homeData.fg_made,
                away3PT: awayData.three_made,
                home3PT: homeData.three_made,
                awayTO: awayData.turnovers,
                homeTO: homeData.turnovers,
                awayFGPct: awayData.fg_pct,
                homeFGPct: homeData.fg_pct
            };

            // Add events to ticker (keep last 10)
            if (events.length > 0) {
                const existingEvents = Array.from(tickerContent.querySelectorAll('.ticker-item')).map(el => el.textContent);
                const newEvents = events.filter(e => !existingEvents.includes(e));
                
                newEvents.forEach(event => {
                    const item = document.createElement('div');
                    item.className = event.includes('🔥') || event.includes('🎯') ? 'ticker-item milestone' : 'ticker-item';
                    item.textContent = event;
                    tickerContent.insertBefore(item, tickerContent.firstChild);
                });

                // Keep only last 10 events
                while (tickerContent.children.length > 10) {
                    tickerContent.removeChild(tickerContent.lastChild);
                }
            }

            // Add initial placeholder if empty
            if (tickerContent.children.length === 0) {
                tickerContent.innerHTML = `
                    <div class="ticker-item">Watching for live stat changes...</div>
                    <div class="ticker-item">Updates every 5 seconds</div>
                `;
            }
        }

        function displayDetailedMargins(data, awayTeam, homeTeam) {
            // Check if NHL, NBA, or NCAA
            const homeData = data.teams.find(t => t.is_home) || data.teams[0];
            const awayData = data.teams.find(t => !t.is_home) || data.teams[1];
            
            if (currentSport === 'nhl') {
                displayNHLMargins(data, awayTeam, homeTeam, awayData, homeData);
            } else {
                // NBA and NCAA use same margin display (basketball stats)
                displayNCAAMargins(data, awayTeam, homeTeam, awayData, homeData);
            }
        }

        function displayNHLMargins(data, awayTeam, homeTeam, awayData, homeData) {
            const shotsAway = parseInt(awayData.shots) || 0;
            const shotsHome = parseInt(homeData.shots) || 0;
            const faceoffAway = parseFloat(awayData.faceoff_pct) || 0;
            const faceoffHome = parseFloat(homeData.faceoff_pct) || 0;
            const hitsAway = parseInt(awayData.hits) || 0;
            const hitsHome = parseInt(homeData.hits) || 0;
            const blockedAway = parseInt(awayData.blocked_shots) || 0;
            const blockedHome = parseInt(homeData.blocked_shots) || 0;
            const pimAway = parseInt(awayData.penalty_minutes) || 0;
            const pimHome = parseInt(homeData.penalty_minutes) || 0;

            const shotsWinner = shotsAway > shotsHome ? 'away' : (shotsAway < shotsHome ? 'home' : 'tie');
            const faceoffWinner = faceoffAway > faceoffHome ? 'away' : (faceoffAway < faceoffHome ? 'home' : 'tie');
            const hitsWinner = hitsAway > hitsHome ? 'away' : (hitsAway < hitsHome ? 'home' : 'tie');
            const blockedWinner = blockedAway > blockedHome ? 'away' : (blockedAway < blockedHome ? 'home' : 'tie');

            const margins = [shotsWinner, faceoffWinner, hitsWinner, blockedWinner].filter(w => w !== 'tie');
            const awayAdvantages = margins.filter(w => w === 'away').length;
            const homeAdvantages = margins.filter(w => w === 'home').length;
            const leader = awayAdvantages > homeAdvantages ? awayTeam : homeTeam;
            const count = Math.max(awayAdvantages, homeAdvantages);

            // NHL team colors
            const nhlColors = {
                'CBJ': { primary: '#002654', dim: 'rgba(0, 38, 84, 0.03)', rgb: '0, 38, 84' },

                'DET': { primary: '#CE1126', dim: 'rgba(206, 17, 38, 0.03)', rgb: '206, 17, 38' },
                'BUF': { primary: '#002654', dim: 'rgba(0, 38, 84, 0.03)', rgb: '0, 38, 84' },
                'PIT': { primary: '#FCB514', dim: 'rgba(252, 181, 20, 0.03)', rgb: '252, 181, 20' },

        function generateInsight(away, home, fgWinner, threeWinner, toWinner, rebWinner) {
            const margins = [fgWinner, threeWinner, toWinner, rebWinner];
            const awayAdvantages = margins.filter(w => w === 'away').length;
            const homeAdvantages = margins.filter(w => w === 'home').length;

            const leader = awayAdvantages > homeAdvantages ? away.name : home.name;
            const count = Math.max(awayAdvantages, homeAdvantages);

            let insightClass = '';
            let message = '';

            if (count >= 3) {
                insightClass = '';
                message = `<strong>${leader}</strong> controls ${count}/4 key margins. Efficiency predicts they extend/maintain lead.`;
            } else {
                insightClass = 'warning';
                message = `Margins are split (${awayAdvantages}-${homeAdvantages}). Close game, outcome uncertain.`;
            }

            return { message, insightClass };
        }

        // ===== SAFE FETCH WRAPPER =====
        async function safeFetch(url, options = {}) {
            const maxRetries = 3;
            let lastError;
            
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, { ...options, timeout: 5000 });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    
                    // Success - hide any error status
                    if (i > 0) {
                        hideConnectionStatus();
                    }
                    
                    return await response.json();
                } catch (error) {
                    lastError = error;
                    
                    if (i === 0) {
                        showConnectionStatus('Connection issue, retrying...', 'reconnecting');
                    }
                    
                    if (i < maxRetries - 1) {
                        await new Promise(resolve => setTimeout(resolve, 1000 * (i + 1)));
                    }
                }
            }
            
            console.warn(`All fetch attempts failed for ${url}:`, lastError);
            showConnectionStatus('Unable to connect to server', 'error');
            return null;
        }

        function extractYouTubeId(url) {
            const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        // Initialize HLS video stream
        var video = document.getElementById('video');
        var streamUrl = 'http://localhost:5001/stream.m3u8?t=' + Date.now();
        
        console.log('Attempting to load stream from:', streamUrl);
            
        if (Hls.isSupported()) {
            var hls = new Hls({
                maxBufferLength: 60,
                maxMaxBufferLength: 120,
                enableWorker: true,
                maxBufferSize: 60 * 1000 * 1000,
                maxBufferHole: 1,
                manifestLoadingTimeOut: 20000,
                manifestLoadingMaxRetry: 10,
                levelLoadingTimeOut: 20000,
                levelLoadingMaxRetry: 10,
                fragLoadingTimeOut: 30000,
                fragLoadingMaxRetry: 10
            });
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                console.log('HLS manifest parsed successfully');
                // Start playing to trigger buffering (overlay hides it)
                video.play().catch(e => console.log('Play blocked', e));
                
                // Check buffer every 500ms
                const bufferCheck = setInterval(() => {
                    const buffered = video.buffered;
                    if (buffered.length > 0) {
                        const bufferEnd = buffered.end(buffered.length - 1);
                        const percent = Math.min(100, (bufferEnd / 60) * 100);
                        
                        document.getElementById('buffer-progress').textContent = `Buffering ${Math.floor(bufferEnd)}s / 60s`;
                        document.getElementById('buffer-bar').style.width = percent + '%';
                        
                        // Once we have 60+ seconds buffered, start at beginning
                        if (bufferEnd >= 60) {
                            clearInterval(bufferCheck);
                            
                            // Seek to start
                            video.currentTime = 0;
                            
                            // Wait for seek to complete
                            video.addEventListener('seeked', function onSeeked() {
                                video.removeEventListener('seeked', onSeeked);
                                console.log('Seeked to start, playing from 0:00');
                                video.play();
                                
                                setTimeout(() => {
                                    document.getElementById('loading-overlay').style.display = 'none';
                                }, 500);
                            });
                        }
                    }
                }, 500);
            });
            
            // Unmute on any click
            document.body.addEventListener('click', function unmute() {
                video.muted = false;
                document.body.removeEventListener('click', unmute);
            }, {once: true});
            
            // Comprehensive error recovery
            hls.on(Hls.Events.ERROR, function(event, data) {
                console.error('HLS error:', data.type, data.details);
                
                if (data.fatal) {
                    switch(data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            console.log('Network error, attempting recovery...');
                            hls.startLoad();
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            console.log('Media error, attempting recovery...');
                            hls.recoverMediaError();
                            break;
                        default:
                            console.log('Fatal error, reloading stream...');
                            hls.destroy();
                            setTimeout(() => location.reload(), 2000);
                            break;
                    }
                } else {
                    // Non-fatal, just retry
                    console.log('Non-fatal error, continuing...');
                }
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = streamUrl;
            video.addEventListener('loadedmetadata', function() {
                console.log('Video metadata loaded');
                video.muted = false;
                video.play().catch(e => {
                    console.log('Autoplay blocked, user interaction needed', e);
                });
            });
            video.addEventListener('error', function(e) {
                console.error('Video error:', e);
            });
        }
        
        // Add click-to-unmute if needed
        document.body.addEventListener('click', function() {
            if (video.paused) {
                video.play();
            }
        }, { once: true });
    </script>
