<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Sports</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #fff;
            cursor: none;
        }

        /* === FULLSCREEN VIDEO === */
        #video {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: contain;
            background: #000;
            z-index: 0;
        }

        /* === BREATHING BORDER — reacts to game intensity === */
        #breathing-border {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 10;
            pointer-events: none;
            --glow-color: 0, 140, 255;
            --glow-intensity: 0.15;
            --pulse-speed: 4s;
            box-shadow: inset 0 0 80px rgba(var(--glow-color), var(--glow-intensity)),
                        inset 0 0 200px rgba(var(--glow-color), calc(var(--glow-intensity) * 0.3));
            animation: breathe var(--pulse-speed) ease-in-out infinite;
            transition: --glow-color 2s, --glow-intensity 1s;
        }
        @keyframes breathe {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* === UPSET FLASH — full border strobe === */
        #breathing-border.upset-alert {
            animation: upset-strobe 0.5s ease-in-out 6;
        }
        @keyframes upset-strobe {
            0%, 100% { box-shadow: inset 0 0 80px rgba(255, 50, 50, 0.4), inset 0 0 200px rgba(255, 50, 50, 0.15); }
            50% { box-shadow: inset 0 0 120px rgba(255, 50, 50, 0.8), inset 0 0 300px rgba(255, 50, 50, 0.3); }
        }

        /* === HOLOGRAPHIC SCORE BUG — top right === */
        #score-bug {
            position: fixed;
            top: 30px; right: 30px;
            z-index: 100;
            background: linear-gradient(135deg, rgba(10,10,30,0.75) 0%, rgba(20,20,50,0.55) 100%);
            backdrop-filter: blur(20px) saturate(1.5);
            -webkit-backdrop-filter: blur(20px) saturate(1.5);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 8px 14px;
            min-width: 180px;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
            transform: translateX(20px);
        }
        #score-bug.visible {
            opacity: 1;
            transform: translateX(0);
        }
        #score-bug::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 50%, rgba(255,255,255,0.05) 100%);
            pointer-events: none;
        }
        .score-teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .score-team {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .score-team-logo {
            width: 24px;
            height: 24px;
            margin-bottom: 2px;
            object-fit: contain;
            filter: drop-shadow(0 0 4px rgba(255,255,255,0.3));
        }
        .score-team-name {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.7;
            margin-bottom: 2px;
        }
        .score-team-score {
            font-size: 22px;
            font-weight: 200;
            letter-spacing: -1px;
            font-variant-numeric: tabular-nums;
        }
        .score-divider {
            width: 1px;
            height: 28px;
            background: rgba(255,255,255,0.15);
        }
        .score-meta {
            text-align: center;
            margin-top: 4px;
            font-size: 9px;
            letter-spacing: 1px;
            opacity: 0.5;
            text-transform: uppercase;
        }

        /* === SMART TICKER — bottom, event-driven === */
        #smart-ticker {
            position: fixed;
            bottom: 0; left: 0;
            width: 100vw;
            z-index: 100;
            background: rgba(0,0,0,0.8);
            border-top: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            height: 38px;
            display: flex;
            align-items: center;
        }
        .ticker-items {
            display: flex;
            white-space: nowrap;
            will-change: transform;
        }
        .ticker-item {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0 30px;
            opacity: 0.9;
        }
        .ticker-sep {
            color: rgba(255,255,255,0.2);
            padding: 0 10px;
            font-size: 10px;
        }
        .ticker-badge {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
        }
        .ticker-badge.upset { background: rgba(255,50,50,0.3); border-color: rgba(255,50,50,0.5); color: #ff6b6b; }
        .ticker-badge.close { background: rgba(255,200,0,0.2); border-color: rgba(255,200,0,0.4); color: #ffd43b; }
        .ticker-badge.live { background: rgba(0,200,100,0.2); border-color: rgba(0,200,100,0.4); color: #69db7c; }
        .ticker-text {
            font-size: 15px;
            font-weight: 400;
            letter-spacing: 0.3px;
        }
        .ticker-score {
            font-variant-numeric: tabular-nums;
            font-weight: 600;
            margin-left: 4px;
        }

        /* === TENSION ARC — ambient edge glow === */
        #tension-bar {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 50;
            pointer-events: none;
            opacity: 0;
            transition: opacity 2s, box-shadow 2s;
            border: 1px solid transparent;
        }
        #tension-bar.active {
            opacity: 1;
        }

        /* === MOMENTUM PARTICLES === */
        .particle {
            position: fixed;
            width: 3px; height: 3px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 50;
            opacity: 0;
            animation: particle-rise 3s ease-out forwards;
        }
        @keyframes particle-rise {
            0% { opacity: 0.8; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-200px) scale(0); }
        }
        @keyframes tensionPulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        /* === CHANNEL INDICATOR — minimal top right === */
        #channel-info {
            position: fixed;
            top: 30px; right: 30px;
            z-index: 100;
            font-size: 11px;
            letter-spacing: 2px;
            opacity: 0.8;
            text-transform: uppercase;
            background: rgba(10,10,30,0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 6px 12px;
        }

        /* === NOTIFICATION TOAST === */
        #notification {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            z-index: 500;
            background: linear-gradient(135deg, rgba(10,10,30,0.9) 0%, rgba(30,10,10,0.85) 100%);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 30px 40px;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #notification.visible {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        #notification .notif-icon { font-size: 48px; margin-bottom: 12px; }
        #notification .notif-title { font-size: 22px; font-weight: 300; letter-spacing: 2px; margin-bottom: 6px; }
        #notification .notif-detail { font-size: 14px; opacity: 0.6; }
        /* === PLAYER STATS OVERLAY === */
        #player-stats {
            position: fixed;
            top: 10px; right: 10px;
            z-index: 100;
            background: linear-gradient(135deg, rgba(10,10,30,0.82) 0%, rgba(20,20,50,0.6) 100%);
            backdrop-filter: blur(20px) saturate(1.5);
            -webkit-backdrop-filter: blur(20px) saturate(1.5);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 6px 10px;
            min-width: 480px;
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }
        #player-stats::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 50%, rgba(255,255,255,0.05) 100%);
            pointer-events: none;
        }
        #player-stats.visible { opacity: 1; transform: translateX(0); }
        .ps-r1 { display: flex; justify-content: center; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; letter-spacing: 1px; margin-bottom: 4px; }
        .ps-r1 img { width: 16px; height: 16px; object-fit: contain; filter: drop-shadow(0 0 3px rgba(255,255,255,0.3)); }
        .ps-vs { opacity: 0.3; font-size: 9px; }
        .ps-meta { opacity: 0.4; font-size: 9px; font-weight: normal; letter-spacing: 1.5px; }
        .ps-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 0; font-size: 11px; }
        .ps-grid-header { font-size: 9px; opacity: 0.3; letter-spacing: 1px; padding: 2px 0; }
        .ps-left { text-align: right; padding-right: 6px; }
        .ps-center { text-align: center; opacity: 0.2; font-size: 9px; padding: 2px 4px; }
        .ps-right { text-align: left; padding-left: 6px; }
        .ps-player-row { padding: 2px 0; display: flex; align-items: center; gap: 6px; font-variant-numeric: tabular-nums; }
        .ps-left .ps-player-row { justify-content: flex-end; }
        .ps-right .ps-player-row { justify-content: flex-start; }
        .ps-val { display: inline-block; width: 36px; text-align: center; white-space: nowrap; }
        .ps-three { color: #ffcc00; font-weight: 600; }
        .ps-three.cold { color: rgba(255,255,255,0.3); font-weight: normal; }
        .ps-pts { font-weight: 600; }
        .ps-name { opacity: 0.7; font-size: 10px; white-space: nowrap; }
    </style>
</head>
<body>
    <!-- Fullscreen video -->
    <video id="video" playsinline></video>

    <!-- Breathing border -->
    <div id="breathing-border"></div>

    <!-- Tension arc -->
    <div id="tension-bar"></div>

    <!-- Score bug — hidden, replaced by live stats bug -->
    <div id="score-bug" style="display:none">
        <div class="score-teams">
            <div class="score-team">
                <img class="score-team-logo" id="away-logo" src="" alt="">
                <div class="score-team-name" id="away-name"></div>
                <div class="score-team-score" id="away-score"></div>
            </div>
            <div class="score-divider"></div>
            <div class="score-team">
                <img class="score-team-logo" id="home-logo" src="" alt="">
                <div class="score-team-name" id="home-name"></div>
                <div class="score-team-score" id="home-score"></div>
            </div>
        </div>
        <div class="score-meta" id="game-clock" style="display:none"></div>
    </div>

    <!-- Smart ticker -->
    <div id="smart-ticker">
        <div class="ticker-items" id="ticker-items"></div>
    </div>

    <!-- Channel info (hidden, data still used by live stats bug) -->
    <div id="channel-info" style="display:none">
        CH <span id="channel-number">--</span>
    </div>

    <!-- Live stats bug — combined matchup overlay -->
    <div id="player-stats">
        <div class="ps-r1">
            <img id="ps-away-logo" src="" alt=""><span id="ps-away-name"></span>
            <span class="ps-vs">vs</span>
            <span id="ps-home-name"></span><img id="ps-home-logo" src="" alt="">
            <span class="ps-meta">· <span id="ps-clock"></span> · CH<span id="ps-channel"></span></span>
        </div>
        <div id="ps-grid" class="ps-grid"></div>
    </div>

    <!-- Center notification -->
    <div id="notification">
        <div class="notif-icon" id="notif-icon"></div>
        <div class="notif-title" id="notif-title"></div>
        <div class="notif-detail" id="notif-detail"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        // === STATE ===
        let currentExcitement = 0;
        let lastUpsetCheck = 0;
        let tickerVisible = false;
        let tickerTimeout = null;
        let selectedGameId = null;

        const isRemote = window.location.hostname !== 'localhost' && window.location.hostname !== '192.168.0.180';
        const remoteParam = isRemote ? '&remote=true' : '';

        // === HLS STREAM ===
        const video = document.getElementById('video');
        if (Hls.isSupported()) {
          (async () => {
            const hls = new Hls({
                liveSyncDurationCount: 2,
                liveMaxLatencyDurationCount: 4,
                maxBufferLength: 6,
                maxMaxBufferLength: 12,
                enableWorker: true,
                maxBufferSize: 10 * 1000 * 1000,
                maxBufferHole: 0.5,
                highBufferWatchdogPeriod: 1,
                manifestLoadingTimeOut: 10000,
                manifestLoadingMaxRetry: 10,
                levelLoadingTimeOut: 10000,
                levelLoadingMaxRetry: 10,
                fragLoadingTimeOut: 10000,
                fragLoadingMaxRetry: 10
            });
            let streamUrl;
            if (isRemote) {
                streamUrl = window.location.origin + '/stream.m3u8?t=' + Date.now() + '&quality=remote';
            } else {
                // LAN: direct 4K from HLS server, bypass Flask
                const hlsPort = 8081;
                const resp = await fetch('/api/stream_source');
                const src = await resp.json();
                streamUrl = `http://${window.location.hostname}:${hlsPort}/${encodeURIComponent(src.filename)}`;
            }
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play().catch(() => {});
            });
            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    console.warn('HLS fatal error, recovering...', data.type);
                    if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                        hls.recoverMediaError();
                    } else {
                        hls.destroy();
                        setTimeout(() => location.reload(), 3000);
                    }
                }
            });
            // Watchdog: if video stalls for 10s, force recovery
            setInterval(() => {
                if (video.paused && video.readyState > 0 && !video.ended) {
                    video.play().catch(() => {});
                }
            }, 10000);
          })();
        }
        document.body.addEventListener('click', () => { video.muted = false; }, {once: true});

        // === BREATHING BORDER ===
        function updateBreathing(excitement, isUpset) {
            const border = document.getElementById('breathing-border');
            if (isUpset) {
                border.classList.add('upset-alert');
                setTimeout(() => border.classList.remove('upset-alert'), 3000);
                return;
            }
            // Map excitement 0-100 to color and intensity
            let r, g, b, intensity, speed;
            if (excitement < 30) {
                // Calm — dim blue
                r = 0; g = 100; b = 255; intensity = 0.08; speed = 5;
            } else if (excitement < 60) {
                // Moderate — cyan/teal
                r = 0; g = 200; b = 200; intensity = 0.15; speed = 3.5;
            } else if (excitement < 80) {
                // Intense — amber
                r = 255; g = 180; b = 0; intensity = 0.25; speed = 2;
            } else {
                // Electric — red/orange
                r = 255; g = 60; b = 30; intensity = 0.4; speed = 1;
            }
            border.style.setProperty('--glow-color', `${r}, ${g}, ${b}`);
            border.style.setProperty('--glow-intensity', intensity);
            border.style.setProperty('--pulse-speed', `${speed}s`);
        }

        // === TENSION BAR — ambient edge glow ===
        function updateTension(margin) {
            const bar = document.getElementById('tension-bar');
            const pct = Math.max(0, Math.min(100, (1 - margin / 30) * 100));
            if (pct < 10) {
                bar.classList.remove('active');
                return;
            }
            bar.classList.add('active');
            const spread = Math.round(pct / 100 * 18);
            if (pct > 80) {
                bar.style.borderColor = 'rgba(255,51,51,0.3)';
                bar.style.boxShadow = `inset 0 0 ${spread}px ${spread/2}px rgba(255,51,51,0.5), inset 0 0 ${spread*2}px ${spread}px rgba(255,51,51,0.15)`;
                bar.style.animation = 'tensionPulse 2.5s ease-in-out infinite';
            } else if (pct > 50) {
                bar.style.borderColor = 'rgba(255,170,0,0.2)';
                bar.style.boxShadow = `inset 0 0 ${spread}px ${spread/2}px rgba(255,170,0,0.35), inset 0 0 ${spread*2}px ${spread}px rgba(255,170,0,0.12)`;
                bar.style.animation = 'tensionPulse 4s ease-in-out infinite';
            } else {
                bar.style.borderColor = 'rgba(0,136,255,0.15)';
                bar.style.boxShadow = `inset 0 0 ${spread}px ${spread/2}px rgba(0,136,255,0.25), inset 0 0 ${spread*2}px ${spread}px rgba(0,136,255,0.08)`;
                bar.style.animation = 'none';
            }
        }

        // === SCORE BUG ===
        function updateScoreBug(away, home, awayScore, homeScore, clock, gameId, awayId, homeId, sport) {
            document.getElementById('away-name').textContent = away;
            document.getElementById('home-name').textContent = home;
            document.getElementById('away-score').textContent = '';
            document.getElementById('home-score').textContent = '';
            document.getElementById('game-clock').textContent = clock;
            const logoBase = {
                'NCAA Basketball': 'https://a.espncdn.com/i/teamlogos/ncaa/500/',
                'NBA': 'https://a.espncdn.com/i/teamlogos/nba/500/',
                'NHL': 'https://a.espncdn.com/i/teamlogos/nhl/500/',
            };
            const base = logoBase[sport] || logoBase['NCAA Basketball'];
            if (awayId) {
                const al = document.getElementById('away-logo');
                al.src = base + awayId + '.png';
                al.style.display = '';
                al.onerror = function(){ this.style.display='none'; };
            }
            if (homeId) {
                const hl = document.getElementById('home-logo');
                hl.src = base + homeId + '.png';
                hl.style.display = '';
                hl.onerror = function(){ this.style.display='none'; };
            }
            document.getElementById('score-bug').classList.add('visible');
        }

        // === SMART TICKER ===
        let tickerPos = 0;
        let tickerWidth = 0;
        let lastTickerHtml = '';
        let pendingTickerHtml = '';
        function showTicker(items) {
            const html = items.map(item => {
                let badgeClass = 'live';
                if (item.upset) badgeClass = 'upset';
                else if (item.margin <= 5) badgeClass = 'close';
                return `<div class="ticker-item">
                    <span class="ticker-badge ${badgeClass}">${item.badge}</span>
                    <span class="ticker-text">${item.text}<span class="ticker-score">${item.score}</span></span>
                </div>`;
            }).join('<span class="ticker-sep">◆</span>');
            if (html === lastTickerHtml) return;
            if (!lastTickerHtml) {
                // First load — render immediately
                _applyTicker(html);
            } else {
                // Queue for seamless swap at loop seam
                pendingTickerHtml = html;
            }
        }
        function _applyTicker(html) {
            const container = document.getElementById('ticker-items');
            lastTickerHtml = html;
            container.innerHTML = html + '<span class="ticker-sep">◆</span>' + html;
            tickerPos = 0;
            tickerWidth = Math.ceil(container.scrollWidth / 2);
        }
        // Lightweight scroll via rAF
        function tickerFrame() {
            tickerPos -= 0.8;
            if (tickerPos <= -tickerWidth) {
                tickerPos += tickerWidth;
                // Swap in pending content at the seam — invisible transition
                if (pendingTickerHtml) {
                    _applyTicker(pendingTickerHtml);
                    pendingTickerHtml = '';
                }
            }
            const el = document.getElementById('ticker-items');
            if (el) el.style.transform = `translate3d(${tickerPos}px,0,0)`;
            requestAnimationFrame(tickerFrame);
        }
        requestAnimationFrame(tickerFrame);

        // === PARTICLES on scoring runs ===
        function spawnParticles(color, count) {
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = (Math.random() * 30 + 10) + 'vw';
                p.style.bottom = '0';
                p.style.background = color;
                p.style.animationDelay = (Math.random() * 0.5) + 's';
                p.style.width = p.style.height = (Math.random() * 3 + 2) + 'px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 3500);
            }
        }

        // === NOTIFICATION ===
        function showNotification(icon, title, detail, duration = 4000) {
            document.getElementById('notif-icon').textContent = icon;
            document.getElementById('notif-title').textContent = title;
            document.getElementById('notif-detail').textContent = detail;
            const el = document.getElementById('notification');
            el.classList.add('visible');
            setTimeout(() => el.classList.remove('visible'), duration);
        }

        // === CHANNEL ===
        let lastKnownChannel = null;
        async function updateChannel() {
            try {
                const data = await (await fetch('/api/current_channel')).json();
                const ch = data.channel || '--';
                document.getElementById('channel-number').textContent = ch;
                if (lastKnownChannel !== null && ch !== lastKnownChannel) {
                    selectedGameId = null; // force re-pick on channel change
                    updatePlayerStats();
                }
                lastKnownChannel = ch;
            } catch(e) {}
        }

        // === MAIN DATA LOOP ===
        let prevScores = {};

        async function updateDashboard() {
            try {
                const sport = 'ncaa-basketball';
                let games = await (await fetch(`/api/excitement?sport=${sport}${remoteParam}`)).json();
                // Fallback to all sports if no NCAA games
                if (!games || !Array.isArray(games) || games.length === 0) {
                    games = await (await fetch(`/api/excitement?sport=all${remoteParam}`)).json();
                }
                if (!games || !Array.isArray(games) || games.length === 0) {
                    // No live games — hide score bug, show upcoming in ticker briefly
                    document.getElementById('score-bug').classList.remove('visible');
                    updateBreathing(5, false);
                    updateTension(30);

                    const upcoming = await (await fetch(`/api/upcoming_games?sport=${sport}`)).json();
                    if (upcoming && upcoming.length > 0 && Date.now() > jokeUntil) {
                        const now = Date.now();
                        showTicker(upcoming.slice(0, 4).map(g => {
                            const m = g.start_time.match(/(\d+)\/(\d+)\s*-\s*(\d+):(\d+)\s*(AM|PM)/i);
                            let countdown = '';
                            if (m) {
                                let h = parseInt(m[3]);
                                if (m[5].toUpperCase() === 'PM' && h !== 12) h += 12;
                                if (m[5].toUpperCase() === 'AM' && h === 12) h = 0;
                                const gd = new Date();
                                gd.setMonth(parseInt(m[1]) - 1); gd.setDate(parseInt(m[2]));
                                gd.setHours(h, parseInt(m[4]), 0, 0);
                                const diff = gd - now;
                                if (diff > 0) {
                                    const hrs = Math.floor(diff / 3600000);
                                    const mins = Math.floor((diff % 3600000) / 60000);
                                    countdown = hrs > 0 ? `${hrs}h ${mins}m` : `${mins}m`;
                                }
                            }
                            return {
                                badge: 'SOON',
                                text: `${g.away_team.replace(/#\d+\s*/, '')} vs ${g.home_team.replace(/#\d+\s*/, '')}`,
                                score: countdown ? `  ${countdown}` : '',
                                margin: 99, upset: false
                            };
                        }));
                    }
                    return;
                }

                // Sort by excitement
                games.sort((a, b) => (b.excitement || 0) - (a.excitement || 0));
                const top = games[0];

                // Always match game to current channel
                const ch = document.getElementById('channel-number')?.textContent;
                const chMatch = ch && ch !== '--' ? games.find(g => String(g.channel) === ch) : null;
                const current = chMatch || games[0];

                // Score bug
                const clock = current.clock || current.status || '';
                updateScoreBug(
                    current.away, current.home,
                    current.away_score, current.home_score,
                    clock, current.game_id, current.away_id, current.home_id, current.sport
                );

                // Detect score changes → particles
                const key = current.id;
                const totalNow = (current.away_score || 0) + (current.home_score || 0);
                if (prevScores[key] && totalNow > prevScores[key]) {
                    const diff = totalNow - prevScores[key];
                    const color = diff >= 3 ? '#ffcc00' : '#00ccff';
                    spawnParticles(color, diff * 4);
                }
                prevScores[key] = totalNow;

                // Breathing border from excitement
                const excitement = current.excitement || 0;
                currentExcitement = excitement;
                updateBreathing(excitement, false);

                // Tension bar fetched separately (real-time, never delayed)

                // Upset detection
                if (current.upset_alert) {
                    updateBreathing(0, true);
                    showNotification('🚨', 'UPSET ALERT', `${current.away_team} ${current.away_score} - ${current.home_score} ${current.home_team}`, 5000);
                }

                // Smart ticker — only show other interesting games
                const tickerGames = games.filter(g => g.id !== current.id && (g.excitement > 50 || Math.abs((g.away_score||0) - (g.home_score||0)) <= 5));
                if (tickerGames.length > 0) {
                    showTicker(tickerGames.slice(0, 5).map(g => {
                        const m = Math.abs((g.away_score||0) - (g.home_score||0));
                        return {
                            badge: m <= 3 ? 'TIGHT' : g.upset_alert ? 'UPSET' : 'LIVE',
                            text: `${g.away_team} vs ${g.home_team}`,
                            score: ` ${g.away_score}-${g.home_score}`,
                            margin: m,
                            upset: !!g.upset_alert
                        };
                    }));
                }
            } catch(e) {
                console.error('Dashboard update error:', e);
            }
        }

        // === AUTO TIP-OFF SWITCH === (DISABLED — auto_channel.py handles switching)
        let lastSwitchedGame = null;
        let lastAutoSwitch = 0;
        async function checkTipOff() {}

        // === SMART TICKER ENGINE ===
        const dadJokes = [
            ["Why do basketball players love donuts?", "Because they can dunk them!"],
            ["What do you call a pig that plays basketball?", "A ball hog."],
            ["Why did the basketball player bring a ladder?", "His coach told him to shoot for the stars."],
            ["What's a basketball player's favorite kind of cheese?", "Swish cheese."],
            ["Why are basketball players messy eaters?", "They're always dribbling."],
            ["Why did the basketball player sit on the sideline and sketch?", "He was trying to draw a foul."],
            ["Why can't basketball players go on vacation?", "They'd get called for traveling."],
            ["What did March say to Madness?", "You complete me."],
            ["Why did the bracket cry?", "Too many upsets."],
            ["What do you call a Cinderella team at midnight?", "Eliminated."],
            ["Why was Cinderella so bad at basketball?", "She had a pumpkin for a coach."],
            ["What do you call a ref who works at a bakery?", "A roll model."],
            ["Why did the hockey player bring string?", "He wanted to tie the game."],
            ["What's a hockey player's favorite meal?", "Icing."],
            ["Why do hockey players make great musicians?", "They know how to hit the right notes."],
            ["What did the baseball glove say to the ball?", "Catch you later!"],
            ["Why was the stadium so hot?", "All the fans left."],
            ["What lights up a soccer stadium?", "A soccer match."],
            ["Why do golfers bring two pairs of pants?", "In case they get a hole in one."],
            ["What do you call a boomerang that doesn't come back?", "A stick."],
            ["Why don't football players ever get cold?", "They're surrounded by fans."],
            ["What's a boxer's favorite drink?", "Punch."],
            ["Why did the scarecrow win an award?", "He was outstanding in his field."],
            ["What do sprinters eat before a race?", "Nothing — they fast."],
            ["Why did the golfer wear two pairs of socks?", "In case he got a hole in one."],
            ["What do you call a sleeping dinosaur at a basketball game?", "A dino-snore."],
            ["Why did the coach go to the bank?", "To get his quarterback."],
            ["What has 18 legs and catches flies?", "A baseball team."],
            ["Why are basketball players so good at solving problems?", "They always find a way around the screen."],
            ["What do you call cheese that isn't yours at a tailgate?", "Nacho cheese."],
        ];

        let dadJokesCache = [];
        let jokeIndex = 0;
        let jokeUntil = 0;
        let jokePhase = 0;
        let tickerQueue = [];
        let tickerCycle = 0;
        let headlinesCache = [];
        let headlineIndex = 0;
        let upsetCache = [];
        let otherScoresCache = [];

        let finalScoresCache = [];
        async function fetchTickerContent(awaitJokes) {
            try {
                const [headlines, mm, scores, finals] = await Promise.all([
                    fetch('/api/espn_headlines').then(r => r.json()).catch(() => []),
                    fetch('/api/march_madness').then(r => r.json()).catch(() => ({})),
                    fetch('/api/excitement?sport=all').then(r => r.json()).catch(() => []),
                    fetch('/api/final_scores').then(r => r.json()).catch(() => [])
                ]);
                headlinesCache = headlines.filter(h => h.headline && h.headline !== 'Error loading headlines');
                upsetCache = (mm.upsets || []).filter(u => u.Upset_Score >= 4 && !u.Matchup?.includes('TBA'));
                otherScoresCache = scores.filter(g => g.sport !== 'NCAA Basketball');
                finalScoresCache = finals;
            } catch(e) {}
            const jokesPromise = fetch('/api/dad_jokes').then(r => r.json()).then(jokes => {
                if (jokes.length) dadJokesCache = jokes;
            }).catch(() => {});
            if (awaitJokes) await jokesPromise;
        }

        function smartTicker() {
            const items = [];

            // Morning greetings
            const hour = new Date().getHours();
            if (hour >= 5 && hour < 9) {
                items.push({ badge: '☀️', text: 'Good morning Weston & Christina! Hope you have an awesome day!', score: '', margin: 99, upset: false });
                items.push({ badge: '☕', text: 'Coffee fact: The average American drinks 3.1 cups of coffee per day', score: '', margin: 99, upset: false });
            }

            // Dad jokes + trivia from API
            const jokes = dadJokesCache.length ? dadJokesCache : dadJokes.map(j => '😂 ' + j[0] + ' ' + j[1]);
            jokes.forEach(j => {
                let badge = '😂';
                if (j.startsWith('🧠')) badge = '🧠';
                else if (j.startsWith('🏀')) badge = '🏀';
                const text = j.replace(/^\p{Emoji_Presentation}\s*/u, '');
                items.push({ badge, text, score: '', margin: 99, upset: false });
            });

            // ESPN headlines
            headlinesCache.slice(0, 5).forEach(h => {
                items.push({ badge: '📰', text: h.headline, score: '', margin: 99, upset: false });
            });

            // Upset watch
            upsetCache.slice(0, 2).forEach(u => {
                items.push({ badge: '🚨', text: `Upset Watch: ${u.Matchup} — Upset Score: ${u.Upset_Score}`, score: '', margin: 2, upset: true });
            });

            // Other live scores
            otherScoresCache.slice(0, 4).forEach(g => {
                const m = Math.abs((parseInt(g.away_score)||0) - (parseInt(g.home_score)||0));
                items.push({
                    badge: g.sport?.replace(' Basketball','').replace(' Hockey','') || 'LIVE',
                    text: `${g.away || g.away_full} vs ${g.home || g.home_full}`,
                    score: ` ${g.away_score}-${g.home_score}`,
                    margin: m, upset: false
                });
            });

            // Final scores
            finalScoresCache.slice(0, 4).forEach(g => {
                items.push({
                    badge: 'FINAL',
                    text: `${g.away} ${g.away_score}, ${g.home} ${g.home_score}`,
                    score: '', margin: 99, upset: false
                });
            });

            if (items.length > 0) showTicker(items);
        }

        async function updateTensionFromAPI() {
            try {
                const d = await (await fetch('/api/tension')).json();
                updateTension(d.margin);
            } catch(e) {}
        }

        // === BOOT ===
        updateChannel();
        Promise.all([
            updateDashboard(),
            fetchTickerContent(true).then(() => smartTicker()),
            updateTensionFromAPI()
        ]);
        // === SCHEDULE-BASED CHANNEL SWITCHING === (DISABLED — auto_channel.py handles switching)
        let lastScheduleSwitch = 0;
        async function checkSchedule() {}

        // === PLAYER SHOOTING STATS OVERLAY ===
        let psGameId = null;
        let psSport = null;
        let prevPlayerPts = {}; // track previous points per player for recency

        async function updatePlayerStats() {
            if (!psGameId) return;
            try {
                const resp = await fetch(`/api/game/${psGameId}/players?sport=${psSport || 'basketball/mens-college-basketball'}`);
                const data = await resp.json();
                const players = data.players || [];
                const overlay = document.getElementById('player-stats');
                const grid = document.getElementById('ps-grid');
                if (!players.length) { overlay.classList.remove('visible'); return; }

                // Detect who just scored by diffing points
                const now = Date.now();
                players.forEach(p => {
                    const key = p.team + p.jersey;
                    const prev = prevPlayerPts[key];
                    const pts = parseInt(p.pts) || 0;
                    if (prev !== undefined && pts > prev) {
                        p._scoredAt = now;
                    } else {
                        p._scoredAt = prevPlayerPts[key + '_t'] || 0;
                    }
                    prevPlayerPts[key] = pts;
                    prevPlayerPts[key + '_t'] = p._scoredAt;
                });

                // Split by team, match to away/home from header
                const awayName = document.getElementById('ps-away-name')?.textContent || '';
                const homeName = document.getElementById('ps-home-name')?.textContent || '';
                const teams = {};
                players.forEach(p => { (teams[p.team] = teams[p.team] || []).push(p); });
                const teamNames = Object.keys(teams);
                if (teamNames.length < 2) { overlay.classList.remove('visible'); return; }
                // Match left=away, right=home
                const t1 = teamNames.find(t => t === awayName) || teamNames[0];
                const t2 = teamNames.find(t => t === homeName) || teamNames.find(t => t !== t1) || teamNames[1];
                const sortFn = (a,b) => (b._scoredAt - a._scoredAt) || (parseInt(b.pts||0) - parseInt(a.pts||0));
                const p1 = teams[t1].sort(sortFn).slice(0,4);
                const p2 = teams[t2].sort(sortFn).slice(0,4);

                const statLine = p => `<span class="ps-val">${p.fg}</span><span class="ps-val ps-three ${p.three_made===0?'cold':''}">${p.three}</span><span class="ps-val" style="opacity:0.5">${p.ft}</span><span class="ps-val ps-pts">${p.pts}</span>`;
                const nameTag = p => `<span class="ps-name">#${p.jersey} ${p.name}</span>`;

                let html = `<div class="ps-left ps-grid-header"><div class="ps-player-row"><span class="ps-val">FG</span><span class="ps-val">3PT</span><span class="ps-val">FT</span><span class="ps-val">PTS</span></div></div><div class="ps-center"></div><div class="ps-right ps-grid-header"><div class="ps-player-row"><span class="ps-val">FG</span><span class="ps-val">3PT</span><span class="ps-val">FT</span><span class="ps-val">PTS</span></div></div>`;
                for (let i = 0; i < 4; i++) {
                    const l = p1[i], r = p2[i];
                    html += `<div class="ps-left"><div class="ps-player-row">${l ? nameTag(l)+statLine(l) : ''}</div></div>`;
                    html += `<div class="ps-center">·</div>`;
                    html += `<div class="ps-right"><div class="ps-player-row">${r ? statLine(r)+nameTag(r) : ''}</div></div>`;
                }
                grid.innerHTML = html;
                overlay.classList.add('visible');
            } catch(e) {}
        }

        // Hook into score bug updates to track current game
        const _origUpdateScoreBug = updateScoreBug;
        updateScoreBug = function(away, home, awayScore, homeScore, clock, gameId, awayId, homeId, sport) {
            _origUpdateScoreBug(away, home, awayScore, homeScore, clock, gameId, awayId, homeId, sport);
            const clockEl = document.getElementById('ps-clock');
            if (clockEl && clock) clockEl.textContent = clock;
            // Update matchup header
            document.getElementById('ps-away-name').textContent = away;
            document.getElementById('ps-home-name').textContent = home;
            const logoBase = {
                'NCAA Basketball': 'https://a.espncdn.com/i/teamlogos/ncaa/500/',
                'NBA': 'https://a.espncdn.com/i/teamlogos/nba/500/',
                'NHL': 'https://a.espncdn.com/i/teamlogos/nhl/500/',
            };
            const base = logoBase[sport] || logoBase['NCAA Basketball'];
            const al = document.getElementById('ps-away-logo');
            const hl = document.getElementById('ps-home-logo');
            if (awayId) { al.src = base + awayId + '.png'; al.style.display = ''; al.onerror = function(){ this.style.display='none'; }; }
            if (homeId) { hl.src = base + homeId + '.png'; hl.style.display = ''; hl.onerror = function(){ this.style.display='none'; }; }
            // Update channel
            const chNum = document.getElementById('channel-number');
            if (chNum) document.getElementById('ps-channel').textContent = chNum.textContent;
            // Show the combined bug
            document.getElementById('player-stats').classList.add('visible');
            if (gameId && gameId !== psGameId) {
                psGameId = gameId;
                psSport = sport === 'NBA' ? 'basketball/nba' : sport === 'NHL' ? 'hockey/nhl' : 'basketball/mens-college-basketball';
                prevPlayerPts = {};
                updatePlayerStats();
            }
        };

        setInterval(updatePlayerStats, 15000);

        // checkTipOff(); // DISABLED — switching to hockey
        setInterval(updateDashboard, 5000);
        setInterval(updateChannel, 3000);
        setInterval(checkSchedule, 300000); // check every 5min
        setInterval(updateTensionFromAPI, 10000);
        setInterval(() => fetchTickerContent().then(() => smartTicker()), 120000);
    </script>
</body>
