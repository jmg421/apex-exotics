<!DOCTYPE html>
<html>
<head>
    <title>Sports Stats Monitor - Margins Over Score</title>
    <style>

        }

        :root {
            --accent-color: #BB0000;
            --team-color: #BB0000;
            --team-color-dim: rgba(187, 0, 0, 0.03);
            --team-color-rgb: 187, 0, 0;

        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 1800px;
            margin: 0 auto;
        }
        .top-row {
            display: grid;
            grid-template-columns: 1.3fr 350px;
            gap: 15px;
        }
        .detail-panel {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #333;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            max-height: 600px;
        }
        .stream-container {
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #333;
            position: relative;
            min-height: 600px;
        }
        .stream-container video {
            width: 100%;
            height: 100%;
            min-height: 600px;
            display: block;

            background: rgba(0, 0, 0, 0.8);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 24px;
            font-weight: bold;
            color: #FFC107;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .control-panel {
            display: flex;

        }
        .control-panel select {

            color: #e0e0e0;
            border: 1px solid #333;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
        }
        .switch-alert {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 193, 7, 0.95);
            color: #000;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;

        }

        }

        .efficiency-panel h3 {

        .game-summary {

        .game-details {

        }
        .teams-compact {

            font-size: 13px;

        }
        .scores-compact {

            border-bottom: 1px solid #333;
        }

        .status {

        .score-row {

        }
        .detail-panel {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #333;
            position: sticky;
            top: 15px;
            max-height: calc(100vh - 30px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;

            overflow-y: auto;

            padding-top: 15px;
            border-top: 1px solid #333;

        .ticker-label {

</head>
<body>
    <div class="container">
        <div class="top-row">
            <div class="stream-container">
                <video id="video" controls autoplay playsinline></video>
                <div class="excitement-overlay" id="excitement-score">
                    <span id="excitement-value">--</span>
                    <div class="control-panel">
                        <button onclick="showESPN()" style="padding: 4px 8px; background: #1a1a1a; color: #e0e0e0; border: 1px solid #333; border-radius: 4px; font-size: 11px; cursor: pointer; margin-right: 6px;" title="Show ESPN">📺</button>
                        <button onclick="showStreamers()" style="padding: 4px 8px; background: #1a1a1a; color: #e0e0e0; border: 1px solid #333; border-radius: 4px; font-size: 11px; cursor: pointer; margin-right: 6px;" title="Streamer Feed">🎮</button>
                        <button onclick="showPersonalized()" style="padding: 4px 8px; background: #1a1a1a; color: #e0e0e0; border: 1px solid #333; border-radius: 4px; font-size: 11px; cursor: pointer; margin-right: 6px;" title="For You">✨</button>
                        <select id="sport-selector" title="Select Sport">
                            <option value="ncaa-basketball">🏀 NCAA</option>
                            <option value="nba">🏀 NBA</option>
                            <option value="mlb">⚾ MLB</option>
                            <option value="nhl">🏒 NHL</option>
                        </select>
                    </div>
                </div>
                <div class="switch-alert" id="switch-alert">⚠️ Switch to Channel XXX</div>
            </div>
            
            <div class="detail-panel" id="detail-panel">
                <div class="player-column" id="away-players">
                    <h3 id="away-team-name">ESPN</h3>
                    <div id="away-player-list" class="player-list"></div>
                </div>
                <div class="player-column" id="home-players">
                    <h3 id="home-team-name">Live Ticker</h3>
                    <div id="home-player-list" class="player-list">📰 Fetching latest news...</div>
                </div>
            </div>
        </div>
        
        <div class="games-bar" id="games-bar">
            <p style="color: #666; font-size: 12px;">Loading games...</p>
        </div>
    </div>

    <script>
        let selectedGames = new Set();
        let previousStats = {}; // Track stat changes for ticker
        let currentSport = localStorage.getItem('selectedSport') || 'ncaa-basketball';
        let currentGameId = null; // Track which game is being viewed
        let manualESPN = false; // Track if user manually selected ESPN

        // Set dropdown to saved value
        document.getElementById('sport-selector').value = currentSport;

        // Sport selector
        document.getElementById('sport-selector').addEventListener('change', (e) => {
            currentSport = e.target.value;
            localStorage.setItem('selectedSport', currentSport);
            
            // Update icon and panel title
            const sportIcons = {
                'ncaa-basketball': '🏀',
                'nba': '🏀',
                'mlb': '⚾',
                'nhl': '🏒'
            };
            selectedGames.clear();
            previousStats = {};
            loadGames();
        });

        // Set initial values
        let currentSelectedGame = null; // Track which game is selected
        let allGameStats = {}; // Store all game stats for efficiency ranking

        async function loadGames() {
            try {
                const resp = await fetch(`/api/games?sport=${currentSport}`);
                const games = await resp.json();
                
                // Only show LIVE games (margins only matter during the game)
                const liveGames = games.filter(g => g.state === 'live' || g.state === 'in');
                const upcomingGames = games.filter(g => g.state === 'pre');

                if (liveGames.length === 0 && upcomingGames.length === 0) {
                    document.getElementById('games').innerHTML = 
                        '<div class="loading">No games scheduled right now.</div>';
                    return;
                }

                // Show live games first, then upcoming (max 16 games for 4x4 grid)
                const displayGames = [...liveGames, ...upcomingGames].slice(0, 16);
                displayGames.forEach(g => selectedGames.add(g.id));
                displayGamesList(displayGames);
                
                // Load stats for all games to calculate efficiency
                loadAllGameStats(liveGames);
            } catch (err) {
                console.error('Error loading games:', err);
            }
        }

        async function loadAllGameStats(games) {
            const statsPromises = games.map(async (game) => {
                try {
                    const resp = await fetch(`/api/game/${game.id}/stats?sport=${currentSport}`);
                    const data = await resp.json();
                    if (data.teams && data.teams.length === 2) {
                        allGameStats[game.id] = {
                            away: game.away,
                            home: game.home,
                            data: data
                        };
                    }
                } catch (err) {
                    console.error(`Error loading stats for ${game.id}:`, err);
                }
            });
            
            await Promise.all(statsPromises);
            // updateEfficiencyRankings(); // Removed - efficiency panel deleted
        }

        function updateEfficiencyRankings() {
            // For NHL, show top players instead of PQD
            if (currentSport === 'nhl') {
                displayNHLTopPlayers();
                return;
            }
            
            // For NBA, show top players if viewing a game
            if (currentSport === 'nba' && currentGameId && allGameStats[currentGameId]) {
                displayNBATopPlayers();
                return;
            }
            
            // For NCAA and NBA (no game selected), show PQD rankings
            const rankings = [];
            const alerts = [];
            
            for (const [gameId, gameData] of Object.entries(allGameStats)) {
                const homeData = gameData.data.teams.find(t => t.is_home) || gameData.data.teams[0];
                const awayData = gameData.data.teams.find(t => !t.is_home) || gameData.data.teams[1];
                
                // Calculate PQD (Possession Quality Differential)
                const calcPQD = (team, opp, teamScore, oppScore) => {
                    const fga = parseInt(team.fg_att) || 0;
                    const fta = parseInt(team.three_att) || 0; // Using 3PT att as proxy for FTA
                    const to = parseInt(team.turnovers) || 0;
                    const offReb = parseInt(team.rebounds) * 0.3 || 0; // Estimate 30% are offensive
                    const defReb = parseInt(opp.rebounds) * 0.7 || 0; // Estimate 70% are defensive
                    
                    // Points per possession
                    const possessions = fga + (0.44 * fta) + to;
                    const ppp = possessions > 0 ? teamScore / possessions : 0;
                    const oppPpp = possessions > 0 ? oppScore / possessions : 0;
                    
                    // Second chance rate (estimated)
                    const secondChance = (offReb + defReb) > 0 ? offReb / (offReb + defReb) : 0;
                    const oppSecondChance = (offReb + defReb) > 0 ? defReb / (offReb + defReb) : 0;
                    
                    // Turnover conversion (estimated as assists/opp turnovers)
                    const assists = parseInt(team.assists) || 0;
                    const oppTo = parseInt(opp.turnovers) || 0;
                    const toConversion = oppTo > 0 ? assists / oppTo : 0;
                    
                    const pqd = (ppp - oppPpp) + (secondChance - oppSecondChance) * 3 + (toConversion * 2);
                    
                    return {
                        pqd: pqd,
                        ppp: ppp.toFixed(2),
                        second_chance: (secondChance * 100).toFixed(1),
                        to_conversion: toConversion.toFixed(2)
                    };
                };
                
                const awayScore = parseInt(gameData.data.teams.find(t => !t.is_home)?.score || 0);
                const homeScore = parseInt(gameData.data.teams.find(t => t.is_home)?.score || 0);
                
                const awayPQD = calcPQD(awayData, homeData, awayScore, homeScore);
                const homePQD = calcPQD(homeData, awayData, homeScore, awayScore);
                
                rankings.push({
                    team: gameData.away,
                    pqd: awayPQD.pqd.toFixed(2),
                    ppp: awayPQD.ppp,
                    second_chance: awayPQD.second_chance,
                    to_conversion: awayPQD.to_conversion
                });
                rankings.push({
                    team: gameData.home,
                    pqd: homePQD.pqd.toFixed(2),
                    ppp: homePQD.ppp,
                    second_chance: homePQD.second_chance,
                    to_conversion: homePQD.to_conversion
                });
                
                // JARVIS STRATEGY 1: Halftime Adjustment (margin divergence)
                const period = gameData.data.period || '';
                if (period.includes('HALF') || period.includes('2ND')) {
                    const awayFGPct = parseFloat(awayData.fg_pct) || 0;
                    const homeFGPct = parseFloat(homeData.fg_pct) || 0;
                    const awayTO = parseInt(awayData.turnovers) || 0;
                    const homeTO = parseInt(homeData.turnovers) || 0;
                    const awayReb = parseInt(awayData.rebounds) || 0;
                    const homeReb = parseInt(homeData.rebounds) || 0;
                    
                    // Check margin control
                    const awayMargins = (awayFGPct > homeFGPct ? 1 : 0) + 
                                       (parseFloat(awayData.three_pct) > parseFloat(homeData.three_pct) ? 1 : 0) +
                                       (awayTO < homeTO ? 1 : 0) + 
                                       (awayReb > homeReb ? 1 : 0);
                    const homeMargins = 4 - awayMargins;
                    
                    // Get scores from game data (need to fetch from games list)
                    const game = Array.from(selectedGames).find(id => id === gameId);
                    
                    if (awayMargins >= 3 && awayEff > homeEff + 5) {
                        alerts.push({
                            type: 'strong',
                            label: 'Halftime Value',
                            message: `${gameData.away} controls ${awayMargins}/4 margins. 2H spread opportunity if trailing.`
                        });
                    }
                    if (homeMargins >= 3 && homeEff > awayEff + 5) {
                        alerts.push({
                            type: 'strong',
                            label: 'Halftime Value',
                            message: `${gameData.home} controls ${homeMargins}/4 margins. 2H spread opportunity if trailing.`
                        });
                    }
                }
                
                // JARVIS STRATEGY 2: Efficiency regime change
                if (previousStats[gameId]) {
                    const prevAwayFG = parseFloat(previousStats[gameId].awayFGPct) || 0;
                    const prevHomeFG = parseFloat(previousStats[gameId].homeFGPct) || 0;
                    const currAwayFG = parseFloat(awayData.fg_pct) || 0;
                    const currHomeFG = parseFloat(homeData.fg_pct) || 0;
                    
                    // Detect cooling off (FG% dropping significantly)
                    if (prevAwayFG > 55 && currAwayFG < prevAwayFG - 3) {
                        alerts.push({
                            type: 'warning',
                            label: 'Cooling Off',
                            message: `${gameData.away} FG% dropping (${prevAwayFG.toFixed(1)}% → ${currAwayFG.toFixed(1)}%). Live under opportunity.`
                        });
                    }
                    if (prevHomeFG > 55 && currHomeFG < prevHomeFG - 3) {
                        alerts.push({
                            type: 'warning',
                            label: 'Cooling Off',
                            message: `${gameData.home} FG% dropping (${prevHomeFG.toFixed(1)}% → ${currHomeFG.toFixed(1)}%). Live under opportunity.`
                        });
                    }
                    
                    // Detect heating up (FG% rising significantly)
                    if (prevAwayFG < 45 && currAwayFG > prevAwayFG + 3) {
                        alerts.push({
                            type: 'warning',
                            label: 'Heating Up',
                            message: `${gameData.away} FG% rising (${prevAwayFG.toFixed(1)}% → ${currAwayFG.toFixed(1)}%). Live over opportunity.`

                    }
                    if (prevHomeFG < 45 && currHomeFG > prevHomeFG + 3) {
                        alerts.push({
                            type: 'warning',

                    const homeOnIce = gameData.data.on_ice[1];
                    
                    // Get ice time for players on ice
                    const getPlayerIceTime = (playerName, team) => {
                        if (!gameData.data.top_players) return null;
                        const player = gameData.data.top_players.find(p => p.name === playerName && p.team === team);
                        return player ? player.ice_seconds : null;
                    };
                    
                    const renderPlayer = (playerName, team) => {
                        const iceSeconds = getPlayerIceTime(playerName, team);
                        let energyBar = '';
                        
                        if (iceSeconds) {
                            // Typical shift: 45 seconds, typical TOI per period: ~5-7 minutes
                            // Energy = 100% - (ice_seconds / 1200) * 100 (20 min period = 1200 sec)
                            const fatigue = Math.min((iceSeconds / 1200) * 100, 100);
                            const energy = 100 - fatigue;
                            const energyColor = energy > 60 ? '#4CAF50' : (energy > 30 ? '#FFC107' : '#f44336');
                            
                            energyBar = `
                                <div style="width: 100%; height: 3px; background: #333; border-radius: 2px; margin-top: 4px; overflow: hidden;">
                                    <div style="width: ${energy}%; height: 100%; background: ${energyColor}; transition: width 0.3s ease;"></div>
                                </div>
                            `;
                        }
                        
                        return `
                            <div style="padding: 6px 8px; background: #0f0f0f; border-radius: 3px; margin-bottom: 4px;">
                                <div style="font-size: 12px; color: #e0e0e0;">${playerName}</div>

        async function loadGameStats(gameId, awayTeam, homeTeam) {
            currentGameId = gameId; // Track current game
            
            try {
                const resp = await fetch(`/api/game/${gameId}/stats?sport=${currentSport}`);
                const data = await resp.json();
                
                if (data.teams && data.teams.length === 2) {
                    // Generate ticker events from stat changes
                    updateTicker(gameId, data, awayTeam, homeTeam);
                    
                    displayDetailedMargins(data, awayTeam, homeTeam);
                }
            } catch (err) {
                console.error(`Error loading stats for game ${gameId}:`, err);
            }
        }

        function updateTicker(gameId, data, awayTeam, homeTeam) {
            const tickerContent = document.getElementById('ticker-content');
            if (!tickerContent) return;

            const homeData = data.teams.find(t => t.is_home) || data.teams[0];
            const awayData = data.teams.find(t => !t.is_home) || data.teams[1];
            
            const events = [];
            const now = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

            // Check for stat changes
            if (previousStats[gameId]) {
                const prev = previousStats[gameId];
                
                // Field goals
                const awayFGDiff = parseInt(awayData.fg_made) - parseInt(prev.awayFG);
                const homeFGDiff = parseInt(homeData.fg_made) - parseInt(prev.homeFG);
                if (awayFGDiff > 0) events.push(`${now} - ${awayTeam}: +${awayFGDiff} FG`);
                if (homeFGDiff > 0) events.push(`${now} - ${homeTeam}: +${homeFGDiff} FG`);
                
                // Three pointers
                const away3Diff = parseInt(awayData.three_made) - parseInt(prev.away3PT);
                const home3Diff = parseInt(homeData.three_made) - parseInt(prev.home3PT);
                if (away3Diff > 0) events.push(`${now} - ${awayTeam}: 🎯 ${away3Diff} three-pointer${away3Diff > 1 ? 's' : ''}`);
                if (home3Diff > 0) events.push(`${now} - ${homeTeam}: 🎯 ${home3Diff} three-pointer${home3Diff > 1 ? 's' : ''}`);
                
                // Turnovers
                const awayTODiff = parseInt(awayData.turnovers) - parseInt(prev.awayTO);
                const homeTODiff = parseInt(homeData.turnovers) - parseInt(prev.homeTO);
                if (awayTODiff > 0) events.push(`${now} - ${awayTeam}: ⚠️ +${awayTODiff} turnover${awayTODiff > 1 ? 's' : ''}`);
                if (homeTODiff > 0) events.push(`${now} - ${homeTeam}: ⚠️ +${homeTODiff} turnover${homeTODiff > 1 ? 's' : ''}`);
                
                // Efficiency milestones
                const awayFGPct = parseFloat(awayData.fg_pct);
                const homeFGPct = parseFloat(homeData.fg_pct);
                if (awayFGPct >= 60 && parseFloat(prev.awayFGPct) < 60) {
                    events.push(`${now} - 🔥 ${awayTeam} shooting 60%+ from field`);
                }
                if (homeFGPct >= 60 && parseFloat(prev.homeFGPct) < 60) {
                    events.push(`${now} - 🔥 ${homeTeam} shooting 60%+ from field`);
                }
            }

            // Store current stats for next comparison
            previousStats[gameId] = {
                awayFG: awayData.fg_made,
                homeFG: homeData.fg_made,
                away3PT: awayData.three_made,
                home3PT: homeData.three_made,
                awayTO: awayData.turnovers,
                homeTO: homeData.turnovers,
                awayFGPct: awayData.fg_pct,
                homeFGPct: homeData.fg_pct
            };

            // Add events to ticker (keep last 10)
            if (events.length > 0) {
                const existingEvents = Array.from(tickerContent.querySelectorAll('.ticker-item')).map(el => el.textContent);
                const newEvents = events.filter(e => !existingEvents.includes(e));
                
                newEvents.forEach(event => {
                    const item = document.createElement('div');
                    item.className = event.includes('🔥') || event.includes('🎯') ? 'ticker-item milestone' : 'ticker-item';
                    item.textContent = event;
                    tickerContent.insertBefore(item, tickerContent.firstChild);
                });

                // Keep only last 10 events
                while (tickerContent.children.length > 10) {
                    tickerContent.removeChild(tickerContent.lastChild);
                }
            }

            // Add initial placeholder if empty
            if (tickerContent.children.length === 0) {
                tickerContent.innerHTML = `
                    <div class="ticker-item">Watching for live stat changes...</div>
                    <div class="ticker-item">Updates every 5 seconds</div>
                `;
            }
        }

        function displayDetailedMargins(data, awayTeam, homeTeam) {
            // Check if NHL, NBA, or NCAA
            const homeData = data.teams.find(t => t.is_home) || data.teams[0];
            const awayData = data.teams.find(t => !t.is_home) || data.teams[1];
            
            if (currentSport === 'nhl') {
                displayNHLMargins(data, awayTeam, homeTeam, awayData, homeData);

                displayNCAAMargins(data, awayTeam, homeTeam, awayData, homeData);
            }
        }

        function displayNHLMargins(data, awayTeam, homeTeam, awayData, homeData) {
            const shotsAway = parseInt(awayData.shots) || 0;
            const shotsHome = parseInt(homeData.shots) || 0;
            const faceoffAway = parseFloat(awayData.faceoff_pct) || 0;
            const faceoffHome = parseFloat(homeData.faceoff_pct) || 0;
            const hitsAway = parseInt(awayData.hits) || 0;
            const hitsHome = parseInt(homeData.hits) || 0;
            const blockedAway = parseInt(awayData.blocked_shots) || 0;
            const blockedHome = parseInt(homeData.blocked_shots) || 0;
            const pimAway = parseInt(awayData.penalty_minutes) || 0;
            const pimHome = parseInt(homeData.penalty_minutes) || 0;

            const shotsWinner = shotsAway > shotsHome ? 'away' : (shotsAway < shotsHome ? 'home' : 'tie');

            const hitsWinner = hitsAway > hitsHome ? 'away' : (hitsAway < hitsHome ? 'home' : 'tie');
            const blockedWinner = blockedAway > blockedHome ? 'away' : (blockedAway < blockedHome ? 'home' : 'tie');

            const margins = [shotsWinner, faceoffWinner, hitsWinner, blockedWinner].filter(w => w !== 'tie');
            const awayAdvantages = margins.filter(w => w === 'away').length;

        async function loadPinnedGames() {
            try {
                const resp = await fetch('/api/pinned_games');
                const pinned = await resp.json();
                pinnedGames = new Set(pinned.map(g => g.id));
                displayPinnedGames(pinned);
            } catch (e) {
                console.error('Error loading pinned games:', e);
            }
        }
        
        async function togglePin(gameId, event) {
            event.stopPropagation();
            
            if (pinnedGames.has(gameId)) {
                // Unpin
                await fetch(`/api/pinned_games?id=${gameId}`, { method: 'DELETE' });
                pinnedGames.delete(gameId);
            } else {
                // Pin - find game data
                const card = document.querySelector(`[data-game-id="${gameId}"]`);
                const game = {
                    id: gameId,
                    away: card.dataset.away,
                    home: card.dataset.home,
                    sport: currentSport
                };
                await fetch('/api/pinned_games', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(game)
                });
                pinnedGames.add(gameId);
            }
            
            loadPinnedGames();
        }

            const container = document.getElementById('pinned-games');
            
            if (pinned.length === 0) {
                container.style.display = 'none';
                return;

            container.style.display = 'grid';
            container.innerHTML = '<h3 style="grid-column: 1/-1; margin: 0 0 10px 0; font-size: 14px; color: #888;">📌 Pinned Games</h3>';
            
            pinned.forEach(game => {

                    updateHeadlineTicker();
                }
            } catch (error) {
                console.log('No stored headlines:', error);
            }
        }
        
        // Load games immediately
        loadGames();
        loadPinnedGames();
        loadExcitement();
        loadStoredHeadlines();
        
        // Load OCR data immediately on startup
        updateStreamOCR();

        // Refresh every 1 second (3 queries: clock, shot clock, stats = 3 req/sec)
        setInterval(loadGames, 1000);
        setInterval(loadExcitement, 30000); // Update excitement every 30 seconds
        setInterval(() => {
            if (!manualESPN) {
                // Auto-refresh stream OCR every 30 seconds
                updateStreamOCR();
            }
        }, 30000);
        
        async function updateStreamOCR() {
            if (manualESPN) return; // Don't update if in manual mode
            
            try {
                const response = await fetch('/api/stream_ocr');
                const data = await response.json();
                
                if (data.success && data.game_info) {
                    const info = data.game_info;
                    const current = info.current_game;
                    
                    // Add new headline to ticker
                    if (info.next_game) {
                        const cleanHeadline = info.next_game.replace('📰 ', '');
                        // Check for similar headlines (fuzzy match)
                        const isDuplicate = headlines.some(h => {
                            const similarity = h.toLowerCase().includes(cleanHeadline.toLowerCase().substring(0, 20)) ||
                                             cleanHeadline.toLowerCase().includes(h.toLowerCase().substring(0, 20));
                            return similarity;
                        });
                        
                        if (!isDuplicate) {
                            headlines.unshift(cleanHeadline);
                            if (headlines.length > MAX_HEADLINES) {
                                headlines.pop();
                            }
                            updateHeadlineTicker();
                        }
                    }
                    
                    if (current && current.away_team) {
                        // Update sidebar with game data
                        document.getElementById('away-team-name').textContent = `${current.away_team} ${current.away_score}`;
                        document.getElementById('home-team-name').textContent = `${current.home_team} ${current.home_score}`;
                        
                        const awayList = document.getElementById('away-player-list');
                        const status = current.status.replace(/mm$/i, '').trim();
                        awayList.innerHTML = `<div style="color: #888; font-size: 12px;">${status}</div>`;
                        
                        if (current.top_performers && current.top_performers.length > 0) {
                            awayList.innerHTML += current.top_performers.map(p => `
                                <div style="margin-top: 8px; font-size: 13px;">${p}</div>
                            `).join('');
                        }
                    }
                }
            } catch (error) {
                console.log('OCR update skipped:', error);
            }
        }
        
        function updateHeadlineTicker() {
            const homeList = document.getElementById('home-player-list');
            homeList.innerHTML = headlines.map((h, i) => `
                <div style="font-size: ${i === 0 ? '13px' : '12px'}; color: ${i === 0 ? '#fff' : '#888'}; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #333;">
                    📰 ${h}
                </div>
            `).join('');
        }
        
        // Load excitement rankings
        async function loadExcitement() {

                    const sport = document.getElementById('sport-selector')?.value || 'nba';

                    if (upcoming && upcoming.length > 0) {
                        gamesBar.innerHTML = '<p style="color: #888; font-size: 11px; margin-bottom: 8px;">📅 UPCOMING HIGH-EXCITEMENT GAMES</p>' +

                                        <div style="font-size: 14px; font-weight: bold; color: #FFC107;">⚡${game.excitement}</div>

                            `).join('');
                    } else {

                    }
                    return;
                }
                
                // If user manually selected ESPN, don't auto-update player columns
                if (manualESPN) {
                    // Still update the games bar
                    gamesBar.innerHTML = games.map((game, i) => `
                        <div class="game-bar-item ${i === 0 ? 'top' : ''}" onclick="selectGame('${game.game_id}')">
                            <div style="font-weight: 600; font-size: 13px; margin-bottom: 4px;">${game.away} @ ${game.home}</div>
                            <div style="font-size: 11px; color: #888; margin-bottom: 4px;">${game.away_score}-${game.home_score} • ${game.status}</div>
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <div style="font-size: 10px; color: #666;">${game.sport}</div>
                                <div style="font-size: 16px; font-weight: bold; color: ${i === 0 ? '#FFC107' : '#4CAF50'};">${game.excitement}</div>
                            </div>

                    `).join('');

                }
                
                // Show top game excitement on video overlay
                const topGame = games[0];
                document.getElementById('excitement-value').textContent = topGame.excitement;
                
                // Update player columns with top game
                document.getElementById('away-team-name').textContent = `${topGame.away} (${topGame.away_score})`;
                document.getElementById('home-team-name').textContent = `${topGame.home} (${topGame.home_score})`;
                
                const awayList = document.getElementById('away-player-list');
                const homeList = document.getElementById('home-player-list');
                
                if (topGame.players && topGame.players.away.length > 0) {
                    awayList.innerHTML = topGame.players.away.map(p => `<div>${p}</div>`).join('');
                } else {
                    awayList.innerHTML = '<div style="color: #666;">No player data</div>';
                }
                
                if (topGame.players && topGame.players.home.length > 0) {
                    homeList.innerHTML = topGame.players.home.map(p => `<div>${p}</div>`).join('');
                } else {
                    homeList.innerHTML = '<div style="color: #666;">No player data</div>';
                }
                
                // Display all games in horizontal bar
                gamesBar.innerHTML = games.map((game, i) => `
                    <div class="game-bar-item ${i === 0 ? 'top' : ''}" onclick="selectGame('${game.game_id}')">
                        <div style="font-weight: 600; font-size: 13px; margin-bottom: 4px;">${game.away} @ ${game.home}</div>
                        <div style="font-size: 11px; color: #888; margin-bottom: 4px;">${game.away_score}-${game.home_score} • ${game.status}</div>

                            <div style="font-size: 10px; color: #666;">${game.sport}</div>

        async function showESPN() {

            document.getElementById('excitement-value').textContent = '--';

        function loadTwitchStream(channel) {
            console.log('Loading Twitch stream:', channel);
            manualESPN = true;  // Prevent auto-switching back to ESPN
            
            // Check if we're on localhost - Twitch only works with localhost parent
            if (window.location.hostname !== 'localhost') {
                alert('Twitch streams only work when accessing via http://localhost:5001\n\nCurrent URL: ' + window.location.hostname);
                return;
            }
            
            const videoContainer = document.querySelector('.stream-container');
            videoContainer.innerHTML = `

        async function showStreamers() {
            console.log('showStreamers called');
            manualESPN = true;
            document.getElementById('away-team-name').textContent = 'Streamers';
            document.getElementById('home-team-name').textContent = '';
            document.getElementById('away-player-list').innerHTML = '<div style="color: #666;">Loading streamer feed via Grok...</div>';
            document.getElementById('home-player-list').innerHTML = '';
            document.getElementById('excitement-value').textContent = '--';
            
            // Remove selected highlight
            document.querySelectorAll('.game-bar-item').forEach(item => item.classList.remove('selected'));
            
            // Fetch streamer feed
            try {
                const response = await fetch('/api/streamer_feed');
                const items = await response.json();
                console.log('Streamer feed items:', items);
                const list = document.getElementById('away-player-list');
                
                if (items && items.length > 0) {
                    // Load top streamer's video (first item is highest viewer count)
                    const topStreamer = items[0].headline.match(/^(.+?) is LIVE$/);
                    console.log('Top streamer match:', topStreamer);
                    if (topStreamer) {
                        const streamerName = topStreamer[1].toLowerCase().replace(/\s*\(.+?\)\s*/g, '').replace(/\s+/g, '');
                        console.log('Extracted streamer name:', streamerName);
                        loadTwitchStream(streamerName);
                    }
                    
                    list.innerHTML = items.map(item => {
                        const match = item.headline.match(/^(.+?) is LIVE$/);
                        if (match) {
                            const channel = match[1].toLowerCase().replace(/\s*\(.+?\)\s*/g, '').replace(/\s+/g, '');
                            return `
                                <div style="margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #333; cursor: pointer;" onclick="loadTwitchStream('${channel}')">
                                    <div style="font-size: 13px; color: #e0e0e0; margin-bottom: 4px;">${item.headline}</div>
                                    <div style="font-size: 10px; color: #666;">${item.description || ''}</div>
                                </div>
                            `;

                        return `
                            <div style="margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #333;">
                                <div style="font-size: 13px; color: #e0e0e0; margin-bottom: 4px;">${item.headline}</div>
                                <div style="font-size: 10px; color: #666;">${item.description || ''}</div>

                }

                document.getElementById('away-player-list').innerHTML = '<div style="color: #666;">Error loading streamer feed</div>';
            }
        }
        
        async function showPersonalized() {
            manualESPN = true;
            document.getElementById('away-team-name').textContent = 'For You';
            document.getElementById('home-team-name').textContent = '';
            document.getElementById('away-player-list').innerHTML = '<div style="color: #666;">Loading your algorithm...</div>';
            document.getElementById('home-player-list').innerHTML = '';
            document.getElementById('excitement-value').textContent = '✨';

                const response = await fetch('/api/viral_videos');
                const videos = await response.json();

                if (videos && videos.length > 0) {

                                <div class="excitement-overlay" id="excitement-score">

                                        <button onclick="showESPN()" style="padding: 4px 8px; background: #1a1a1a; color: #e0e0e0; border: 1px solid #333; border-radius: 4px; font-size: 11px; cursor: pointer; margin-right: 6px;" title="Show ESPN">📺</button>
                                        <button onclick="showStreamers()" style="padding: 4px 8px; background: #1a1a1a; color: #e0e0e0; border: 1px solid #333; border-radius: 4px; font-size: 11px; cursor: pointer; margin-right: 6px;" title="Streamer Feed">🎮</button>
                                        <button onclick="showPersonalized()" style="padding: 4px 8px; background: #1a1a1a; color: #e0e0e0; border: 1px solid #333; border-radius: 4px; font-size: 11px; cursor: pointer; margin-right: 6px;" title="For You">✨</button>
                                        <select id="sport-selector" title="Select Sport">
                                            <option value="ncaa-basketball">🏀 NCAA</option>
                                            <option value="nba">🏀 NBA</option>

                                            <option value="nhl">🏒 NHL</option>

                                    </div>

                    // Show video list with click handlers
                    list.innerHTML = videos.map((video, i) => `

                             style="margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #333; cursor: pointer; transition: background 0.2s;"
                             onmouseover="this.style.background='#1a1a1a'" 
                             onmouseout="this.style.background='transparent'">

                document.getElementById('away-player-list').innerHTML = '<div style="color: #666;">Error loading feed</div>';

        }
        
        function extractYouTubeId(url) {
            const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }
        
        function playVideo(url, title, creator) {
            const videoId = extractYouTubeId(url);
            if (videoId) {
                const videoContainer = document.querySelector('.stream-container');
                videoContainer.innerHTML = `
                    <iframe width="100%" height="100%" 
                        src="https://www.youtube.com/embed/${videoId}?autoplay=1" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                    </iframe>
                    <div class="excitement-overlay" id="excitement-score">
                        <span id="excitement-value">✨</span>
                        <div class="control-panel">
                            <button onclick="showESPN()" style="padding: 4px 8px; background: #1a1a1a; color: #e0e0e0; border: 1px solid #333; border-radius: 4px; font-size: 11px; cursor: pointer; margin-right: 6px;" title="Show ESPN">📺</button>
                            <button onclick="showStreamers()" style="padding: 4px 8px; background: #1a1a1a; color: #e0e0e0; border: 1px solid #333; border-radius: 4px; font-size: 11px; cursor: pointer; margin-right: 6px;" title="Streamer Feed">🎮</button>
                            <button onclick="showPersonalized()" style="padding: 4px 8px; background: #1a1a1a; color: #e0e0e0; border: 1px solid #333; border-radius: 4px; font-size: 11px; cursor: pointer; margin-right: 6px;" title="For You">✨</button>
                            <select id="sport-selector" title="Select Sport">
                                <option value="ncaa-basketball">🏀 NCAA</option>
                                <option value="nba">🏀 NBA</option>
                                <option value="mlb">⚾ MLB</option>
                                <option value="nhl">🏒 NHL</option>
                            </select>
                        </div>
                    </div>
                `;
                
                // Update player info
                document.getElementById('away-team-name').textContent = creator;
                document.getElementById('away-player-list').scrollTop = 0;
            }
        }
        
        function selectGame(gameId) {
            manualESPN = false; // User clicked a game, exit ESPN mode
            fetch('/api/excitement')
                .then(res => res.json())
                .then(games => {
                    const game = games.find(g => g.game_id === gameId);
                    if (!game) return;
                    
                    // Update player columns
                    document.getElementById('away-team-name').textContent = `${game.away} (${game.away_score})`;
                    document.getElementById('home-team-name').textContent = `${game.home} (${game.home_score})`;
                    document.getElementById('excitement-value').textContent = game.excitement;
                    
                    const awayList = document.getElementById('away-player-list');
                    const homeList = document.getElementById('home-player-list');
                    
                    if (game.players && game.players.away.length > 0) {
                        awayList.innerHTML = game.players.away.map(p => `<div>${p}</div>`).join('');
                    } else {
                        awayList.innerHTML = '<div style="color: #666;">No player data</div>';
                    }
                    
                    if (game.players && game.players.home.length > 0) {
                        homeList.innerHTML = game.players.home.map(p => `<div>${p}</div>`).join('');
                    } else {
                        homeList.innerHTML = '<div style="color: #666;">No player data</div>';
                    }
                    
                    // Highlight selected game
                    document.querySelectorAll('.game-bar-item').forEach(item => item.classList.remove('selected'));
                    event.target.closest('.game-bar-item').classList.add('selected');
                })
                .catch(err => console.error('Error selecting game:', err));
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        // Initialize HLS video stream
        var video = document.getElementById('video');
        var streamUrl = 'http://localhost:5001/stream.m3u8?t=' + Date.now();
        
        console.log('Attempting to load stream from:', streamUrl);
            
        if (Hls.isSupported()) {
            var hls = new Hls({
                liveSyncDurationCount: 1,
                liveMaxLatencyDurationCount: 3
            });
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                console.log('HLS manifest parsed successfully');
                video.muted = false;
                video.play().catch(e => {
                    console.log('Autoplay blocked, user interaction needed', e);
                });
            });
            hls.on(Hls.Events.ERROR, function(event, data) {
                console.error('HLS error:', data.type, data.details, data);
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = streamUrl;
            video.addEventListener('loadedmetadata', function() {
                console.log('Video metadata loaded');
                video.muted = false;
                video.play().catch(e => {
                    console.log('Autoplay blocked, user interaction needed', e);
                });
            });
            video.addEventListener('error', function(e) {
                console.error('Video error:', e);
            });
        }
        
        // Add click-to-unmute if needed
        document.body.addEventListener('click', function() {
            if (video.paused) {
                video.play();
            }
        }, { once: true });
    </script>
